# tests.legacy — per-cycle suites preserved for regression checks against
# the legacy module layouts. Each `mod02` … `mod11` suite captures that
# learning-cycle's test contract; the warm rerun loop runs these so older
# labs stay validated even as the latest cycle's code evolves.
#
# (Per-suite field semantics are identical to tests — see that
# file's header for the field walkthrough including the `sampleTest`
# callout.)
#
# YAML conventions: indent with spaces only (yaml.v3 rejects tabs). Quote
# strings that could parse as a YAML scalar (`yes`, `no`, country codes).

setupCommands:
  - name: Clean
    command: dotnet clean
  - name: Build
    command: dotnet build
testFilter: '&DisplayName~<test>'
testFilterJoin: fragment-or
# suiteGroups bridges the BPMN process-flow suite literals — acceptance,
# contract-stub, contract-real, emitted by the verify-tests-pass /
# verify-tests-fail call-activities — onto the mod10/mod11 legacy suite ids,
# so the legacy configs run through the exact same runtime/preflight path as
# the latest-cycle tests.yaml. Mirrors that file's `acceptance` group
# (isolated suites included), extended with the two contract aliases because
# the legacy suites carry mod-prefixed ids rather than the bare canonical
# names. As in tests.yaml, `contract-stub` is the non-isolated suite only;
# mod11-contract-stub-isolated stays declared-but-unreferenced.
suiteGroups:
  acceptance: [mod10-acceptance-api, mod10-acceptance-ui, mod10-acceptance-isolated-api, mod10-acceptance-isolated-ui]
  contract-stub: [mod11-contract-stub]
  contract-real: [mod11-contract-real]
suites:
  - id: mod02-smoke
    name: mod02 - Smoke (real)
    command: dotnet test --filter 'FullyQualifiedName~.Legacy.Mod02.SmokeTests' -e EXTERNAL_SYSTEM_MODE=real --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests\TestResults\testResults.html
    sampleTest: ShouldBeAbleToGoToMyShop
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: mod03-e2e
    name: mod03 - E2E
    command: dotnet test --filter 'FullyQualifiedName~.Legacy.Mod03.E2eTests' --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests\TestResults\testResults.html
    sampleTest: ShouldPlaceOrder
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: mod04-smoke

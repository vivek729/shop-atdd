# tests — the suites the pipeline runs against the latest cycle's
# code. One entry per suite; the user / CI picks via `--suite <id>`.
#
# Per-suite fields:
#   - id, name: how the user / CI selects and labels this run
#   - command: the language-native test-runner invocation (gradle / dotnet /
#     npx playwright) that runs the suite
#   - env (optional): env vars added to the suite's process (CHANNEL,
#     EXTERNAL_SYSTEM_MODE, etc.) — the runner injects these on top of the
#     ambient environment
#   - path: cwd for the test process, relative to this file's directory
#   - testReportPath: where the language runner drops the HTML report
#   - testCountPath: machine-readable report (TRX) parsed ONLY to count
#     executed tests; arms the empty-selection guard for dotnet, which exits
#     0 on a zero-match filter (so a pass-verify would otherwise green on
#     zero tests). The TRX is already emitted by each command's
#     `--logger 'trx;...'`; this just points the guard at it.
#   - sampleTest: the canonical test name passed to `command` when the user
#     runs with `--sample` — NOT "the test that always runs", just a
#     known-good example for smoke-checking the pipeline plumbing
#   - testInstallCommands (optional): one-time install steps that have to
#     happen inside this suite's cwd before the language runner starts
#     (e.g. `playwright install`)
#
# Top-level `testFilter` carries the `<test>` placeholder the runner
# substitutes when the user passes `--test <name>`; the substituted string
# is appended to `command`. A suite that needs a different filter shape
# overrides it with its own `testFilter:` entry.
#
# `suiteGroups` (optional) maps an alias name to a list of suite ids —
# `gh optivem system-test run --suite <alias>` substitutes the alias with its
# constituent ids before the runner sees them. Each acceptance channel has TWO
# concrete partition suites — acceptance-parallel-<ch> (runs in parallel) and
# acceptance-isolated-<ch> (runs serially) — and a per-channel group alias
# `acceptance-<ch>` that fans out to both, plus the top-level `acceptance`
# covering every channel's partitions. Per-project entries here override the
# Go-side default registry (which provides the same groups); omit the block to
# fall back to the default. The BPMN runtime emits `--suite=acceptance` from
# the verify-tests-pass / verify-tests-fail call-activities.
#
# `setupCommands` runs once when invoked via `gh optivem system-test setup` —
# typically the build / dependency install. `test system` does not run it
# implicitly; chain `test setup` before the first `test system` call.
#
# YAML conventions: indent with spaces only (yaml.v3 rejects tabs). Quote
# strings that could parse as a YAML scalar (`yes`, `no`, country codes).

setupCommands:
  - name: Clean
    command: dotnet clean
  - name: Build
    command: dotnet build
testFilter: '&DisplayName~<test>'
testFilterJoin: fragment-or
suiteGroups:
  acceptance: [acceptance-parallel-api, acceptance-isolated-api, acceptance-parallel-ui, acceptance-isolated-ui]
  acceptance-api: [acceptance-parallel-api, acceptance-isolated-api]
  acceptance-ui: [acceptance-parallel-ui, acceptance-isolated-ui]
suites:
  - id: smoke-stub
    name: latest - Smoke (stub)
    command: dotnet test --filter 'FullyQualifiedName~.Latest.SmokeTests' -e EXTERNAL_SYSTEM_MODE=stub --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldBeAbleToGoToMyShop
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: smoke-real
    name: latest - Smoke (real)
    command: dotnet test --filter 'FullyQualifiedName~.Latest.SmokeTests' -e EXTERNAL_SYSTEM_MODE=real --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldBeAbleToGoToMyShop
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: acceptance-parallel-api
    name: latest - Acceptance Parallel (stub) - API
    command: dotnet test --filter 'FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated' -e CHANNEL=API --logger 'trx;LogFileName=parallel-api.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/parallel-api.trx
    sampleTest: ShouldBeAbleToPlaceOrderForValidInput
  - id: acceptance-parallel-ui
    name: latest - Acceptance Parallel (stub) - UI
    command: dotnet test --filter 'FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated' -e CHANNEL=UI -e CHANNEL_MODE=static --logger 'trx;LogFileName=parallel-ui.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/parallel-ui.trx
    sampleTest: ShouldBeAbleToPlaceOrderForValidInput
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: acceptance-isolated-api
    name: latest - Acceptance Isolated (stub) - API
    command: dotnet test --filter 'FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated' -e CHANNEL=API --logger 'trx;LogFileName=isolated-api.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/isolated-api.trx
    sampleTest: ShouldRecordPlacementTimestamp
  - id: acceptance-isolated-ui
    name: latest - Acceptance Isolated (stub) - UI
    command: dotnet test --filter 'FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated' -e CHANNEL=UI -e CHANNEL_MODE=static --logger 'trx;LogFileName=isolated-ui.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/isolated-ui.trx
    sampleTest: ShouldRecordPlacementTimestamp
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: contract-stub
    name: latest - Contract (stub)
    command: dotnet test --filter 'FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub&Category!=isolated' --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldBeAbleToGetTime
  - id: contract-stub-isolated
    name: latest - Contract Isolated (stub)
    command: dotnet test --filter 'FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub&Category=isolated' --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldBeAbleToGetConfiguredTime
  - id: contract-real
    name: latest - Contract (real)
    command: dotnet test --filter 'FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real' --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldBeAbleToGetTime
  - id: e2e-api
    name: latest - E2E (real) - API
    command: dotnet test --filter 'FullyQualifiedName~.Latest.E2eTests' -e CHANNEL=API --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldPlaceOrder
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install
  - id: e2e-ui
    name: latest - E2E (real) - UI
    command: dotnet test --filter 'FullyQualifiedName~.Latest.E2eTests' -e CHANNEL=UI -e CHANNEL_MODE=static --logger 'trx;LogFileName=testResults.trx' --logger 'html;LogFileName=testResults.html' --logger 'console;verbosity=detailed'
    path: SystemTests
    testReportPath: SystemTests/TestResults/testResults.html
    testCountPath: TestResults/testResults.trx
    sampleTest: ShouldPlaceOrder
    testInstallCommands:
      - pwsh bin/Debug/net8.0/playwright.ps1 install

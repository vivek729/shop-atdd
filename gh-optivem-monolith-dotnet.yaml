project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo-strategy: mono-repo
channels: [api, ui]
sonar:
    organization: optivem
system:
    architecture: monolith
    config: docker/dotnet/monolith/systems.yaml
    path: system/monolith/dotnet
    repo: optivem/shop
    lang: dotnet
    sonar-project: optivem_shop-monolith-dotnet
    db-migration-path: system/db/migrations
system-test:
    path: system-test/dotnet
    config: system-test/dotnet/tests.yaml
    repo: optivem/shop
    lang: dotnet
    sonar-project: optivem_shop-tests-dotnet
    paths:
        system-driver-port: system-test/dotnet/Driver.Port
        system-driver-adapter: system-test/dotnet/Driver.Adapter
        system-driver-adapter-shared: system-test/dotnet/Driver.Adapter/Shared
        common: system-test/dotnet/Common
        domain-value-types: system-test/dotnet/DomainValueTypes
        external-system-driver-port: system-test/dotnet/Driver.Port/External
        external-system-driver-adapter: system-test/dotnet/Driver.Adapter/External
        at-test: system-test/dotnet/SystemTests/Latest/AcceptanceTests
        dsl-port: system-test/dotnet/Dsl.Port
        dsl-core: system-test/dotnet/Dsl.Core
        ct-test: system-test/dotnet/SystemTests/Latest/ExternalSystemContractTests
    system-driver-adapter-channels:
        api: system-test/dotnet/Driver.Adapter/Api
        ui: system-test/dotnet/Driver.Adapter/Ui
external-systems:
    clock:
        real-kind: simulator
        stub:
            path: external-systems/stubs
            repo: optivem/shop
        simulator:
            path: external-systems/simulators
            repo: optivem/shop
    erp:
        real-kind: simulator
        stub:
            path: external-systems/stubs
            repo: optivem/shop
        simulator:
            path: external-systems/simulators
            repo: optivem/shop
    tax:
        real-kind: simulator
        stub:
            path: external-systems/stubs
            repo: optivem/shop
        simulator:
            path: external-systems/simulators
            repo: optivem/shop

project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo_strategy: mono-repo
sonar:
    organization: optivem
system:
    architecture: monolith
    config: docker/dotnet/monolith/systems.yaml
    path: system/monolith/dotnet
    repo: optivem/shop
    lang: dotnet
    sonar_project: optivem_shop-monolith-dotnet
system_test:
    path: system-test/dotnet
    config: system-test/dotnet/tests.legacy.yaml
    repo: optivem/shop
    lang: dotnet
    sonar_project: optivem_shop-tests-dotnet
external_systems:
    stubs:
        path: external-systems/stubs
        repo: optivem/shop
    simulators:
        path: external-systems/simulators
        repo: optivem/shop

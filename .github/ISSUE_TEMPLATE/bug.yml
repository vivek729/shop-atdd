name: Bug
description: A defect — observed behavior diverges from intended behavior.
type: Bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Why this ticket exists. One paragraph.
    validations:
      required: false
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Numbered steps that reliably reproduce the defect.
      render: markdown
      value: |
        1. <step>
        2. <step>
        3. <step>
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Given/When/Then scenarios describing the corrected behavior.
      render: markdown
      value: |
        Scenario: <name>
          Given <precondition>
          When <action>
          Then <observable outcome>
    validations:
      required: true
  - type: textarea
    id: legacy-acceptance-criteria
    attributes:
      label: Legacy Acceptance Criteria
      description: Backfill section for prior-format criteria. Leave empty if not applicable.
      render: markdown
    validations:
      required: false

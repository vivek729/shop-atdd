name: monolith-typescript-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string
      debug-skip-tests:
        description: 'DEBUG ONLY: bypass acceptance tests and tag the RC anyway. Produces an RC tag indistinguishable from a tested one. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: monolith-typescript-acceptance-stage

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/monolith/typescript/VERSION

      - name: Check System Release Already Published
        id: check-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: monolith-typescript-v${{ steps.read-base-version.outputs.base-version }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: monolith-typescript-v*-rc.*
          paths: |
            system-test/typescript
            .github/workflows/monolith-typescript-acceptance-stage.yml

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.check-tag.outputs.exists == 'true' }}, "reason": "Release in progress — version already tagged, awaiting post-release VERSION bump."},
              {"when": ${{ steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true' }}, "reason": "No new artifacts since last run AND no test/workflow changes since last RC tag." }
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: monolith-typescript-acceptance
    permissions:
      contents: read
      packages: write
    env:
      # Job-level so every per-suite `gh optivem test system` step inherits.
      # PropertyLoader / configuration-loader.ts pick this up to select
      # test-config-acceptance-{stub,real}.json.
      ENVIRONMENT: acceptance
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/monolith

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3311/" },
              { "name": "MyShop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/monolith

      - name: Simulate Deployment (Stub External Systems)
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3312/" },
              { "name": "MyShop API", "url": "http://localhost:8312/health" },
              { "name": "ERP", "url": "http://localhost:9312/erp/health" },
              { "name": "Clock", "url": "http://localhost:9312/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Setup Node
        if: ${{ !inputs.debug-skip-tests }}
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system-test/typescript/package-lock.json

      - name: Cache Playwright Browsers
        id: cache-playwright
        if: ${{ !inputs.debug-skip-tests }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright System Dependencies
        if: ${{ !inputs.debug-skip-tests }}
        timeout-minutes: 10
        # Linux-only system packages (apt-get) for Chromium. Browser binaries
        # themselves come from `npx playwright install chromium`, which the
        # CLI runs as a setupCommand from tests-latest.json.
        uses: Wandalen/wretry.action@v3
        with:
          command: npx playwright install-deps chromium
          current_path: system-test/typescript
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install gh-optivem CLI extension
        if: ${{ !inputs.debug-skip-tests }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      # Per-suite invocations of `gh optivem test system`. Each suite ID below
      # matches an entry in tests-latest.json's suites[]. Splitting one step
      # per suite restores the GitHub Actions UI's per-suite green/red
      # checkmarks so a failure surfaces as a specific named step, not as a
      # buried row in a single step's summary table.
      #
      # The first step omits `--no-setup` so setupCommands (npm ci + playwright
      # install) run once. Subsequent steps pass `--no-setup` to reuse the
      # already-prepared workspace; without it each step would re-run the full
      # setup block.
      - name: smoke-stub
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite smoke-stub --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: smoke-real
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite smoke-real --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: acceptance-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite acceptance-api --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: acceptance-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite acceptance-ui --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: acceptance-isolated-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite acceptance-isolated-api --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: acceptance-isolated-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite acceptance-isolated-ui --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: contract-stub
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite contract-stub --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: contract-stub-isolated
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite contract-stub-isolated --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: contract-real
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite contract-real --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: e2e-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite e2e-api --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: e2e-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem test system --suite e2e-ui --no-setup --no-build --no-start --system-config docker/typescript/monolith/system.json --test-config system-test/typescript/tests-latest.json

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/monolith/typescript/VERSION

      - name: Compose Prerelease Version
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: monolith-typescript

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  sonar:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system-test/typescript/package-lock.json

      - name: Run Sonar Analysis
        working-directory: system-test/typescript
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: pwsh ./Run-Sonar.ps1

  summary:
    needs: [preflight, check, run, publish-tag, sonar]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: acceptance
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

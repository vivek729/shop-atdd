name: monolith-java-acceptance-stage-cloud

on:
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

permissions: {}

concurrency:
  group: monolith-java-acceptance-stage-cloud

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-java
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.artifacts-changed.outputs.newer == 'true' || steps.test-changes.outputs.changed == 'true' }}
      skip-reason: ${{ (steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true') && 'No new artifacts since last run AND no test/workflow changes since last RC tag.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-java
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: monolith-java-cloud-v*-rc.*
          paths: |
            system-test/java
            .github/workflows/monolith-java-acceptance-stage-cloud.yml

  deploy-app:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: monolith-java-acceptance
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy App to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: monolith-java-acceptance
          image: ${{ fromJson(needs.check.outputs.image-digest-urls)[0] }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=cloud
          secrets: |
            DATABASE_URL=db-connection-string:latest
          flags: --port=8080 --max-instances=3 --allow-unauthenticated

      - name: Wait for App Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "monolith-java-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-external-real:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: external-real-acceptance
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=9000 --max-instances=3 --allow-unauthenticated

      - name: Wait for External Real Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "external-real-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-external-stub:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy External Stub to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: external-stub-acceptance
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-stub:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=8080 --max-instances=3 --allow-unauthenticated

      - name: Wait for External Stub Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "external-stub-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  test-smoke-real:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Smoke Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-smoke-stub:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Smoke Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Acceptance Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        timeout-minutes: 10
        uses: Wandalen/wretry.action@v3
        with:
          command: npx playwright install-deps chromium
          current_path: system-test/java
          attempt_limit: 3
          attempt_delay: 30000

      - name: Run Acceptance Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-isolated-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-isolated-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        timeout-minutes: 10
        uses: Wandalen/wretry.action@v3
        with:
          command: npx playwright install-deps chromium
          current_path: system-test/java
          attempt_limit: 3
          attempt_delay: 30000

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-contract-stub:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Contract Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexcludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-contract-stub-isolated:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Contract Tests (Stub) (Isolated)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DincludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-contract-real:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Contract Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-e2e-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-e2e-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        timeout-minutes: 10
        uses: Wandalen/wretry.action@v3
        with:
          command: npx playwright install-deps chromium
          current_path: system-test/java
          attempt_limit: 3
          attempt_delay: 30000

      - name: Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-app.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  promote:
    needs: [check, deploy-app, test-smoke-real, test-smoke-stub, test-acceptance-api, test-acceptance-ui, test-acceptance-isolated-api, test-acceptance-isolated-ui, test-contract-stub, test-contract-stub-isolated, test-contract-real, test-e2e-api, test-e2e-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/monolith/java/VERSION

      - name: Compose Prerelease Version
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: monolith-java-cloud

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  publish-tag:
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, promote, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage (Cloud Run)'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.promote.result }}
        environment: acceptance
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

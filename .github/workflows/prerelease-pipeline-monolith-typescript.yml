name: prerelease-pipeline-monolith-typescript

run-name: >-
  prerelease-pipeline-monolith-typescript${{ inputs.level && inputs.level != 'qa' && format(' [level:{0}]', inputs.level) || '' }}${{ inputs.skip-local-stage && ' [skip-local]' || '' }}${{ inputs.skip-commit-stage && ' [skip-commit]' || '' }}${{ inputs.skip-acceptance-legacy && ' [skip-acceptance-legacy]' || '' }}${{ inputs.commit-sha && ' [pinned-sha]' || '' }}

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - qa
        default: 'qa'
      skip-local-stage:
        description: 'Skip local stage'
        required: false
        type: boolean
        default: false
      skip-commit-stage:
        description: 'Skip commit stage'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in the local stage and the acceptance-stage-legacy job'
        required: false
        type: boolean
        default: false
      commit-sha:
        description: 'Git SHA to pin (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_prerelease-pipeline.yml
    secrets: inherit
    with:
      prefix: monolith-typescript
      architecture: monolith
      language: typescript
      commit-workflows: '["monolith-typescript-commit-stage.yml"]'
      level: ${{ inputs.level || 'qa' }}
      skip-local-stage: ${{ inputs.skip-local-stage == true }}
      skip-commit-stage: ${{ inputs.skip-commit-stage == true }}
      skip-acceptance-legacy: ${{ inputs.skip-acceptance-legacy == true }}
      commit-sha: ${{ inputs.commit-sha }}

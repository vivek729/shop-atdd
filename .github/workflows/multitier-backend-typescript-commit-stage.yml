name: multitier-backend-typescript-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-typescript/**'
        - '!system/multitier/backend-typescript/VERSION'
        - '.github/workflows/multitier-backend-typescript-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-typescript/**'
        - '!system/multitier/backend-typescript/VERSION'
        - '.github/workflows/multitier-backend-typescript-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.base-version }}
      image-digest-url: ${{ steps.digest-url.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/backend-typescript/VERSION

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/multitier/backend-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/multitier/backend-typescript

      - name: Compile Code
        run: npm run build
        working-directory: system/multitier/backend-typescript

      - name: Run Unit Tests
        run: npm test
        working-directory: system/multitier/backend-typescript

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: npm run lint
        working-directory: system/multitier/backend-typescript

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && vars.SKIP_SONAR != 'true'
        uses: optivem/actions/retry@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          working-directory: system/multitier/backend-typescript
          command: bash ./run-sonar.sh

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}
          prefix: multitier-backend-typescript

      - name: Log in to GHCR
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker Metadata
        if: steps.verify-main.outputs.on-branch == 'true'
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-backend-typescript
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base images
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: optivem/actions/retry@v1
        with:
          command: docker pull node:22-alpine

      - name: Build and Push Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/backend-typescript
          file: system/multitier/backend-typescript/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.verify-main.outputs.on-branch == 'true'
        id: digest-url
        shell: bash
        run: echo "value=ghcr.io/${{ github.repository }}/multitier-backend-typescript@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

name: multitier-backend-dotnet-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-dotnet/**'
        - '!system/multitier/backend-dotnet/VERSION'
        - '.github/workflows/multitier-backend-dotnet-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-dotnet/**'
        - '!system/multitier/backend-dotnet/VERSION'
        - '.github/workflows/multitier-backend-dotnet-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.digest-url.outputs.digest-url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Check Commit on Main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: 'system/multitier/backend-dotnet/**/*.csproj'

      - name: Compile Code
        run: dotnet build
        working-directory: system/multitier/backend-dotnet

      - name: Run Unit Tests
        run: dotnet test
        working-directory: system/multitier/backend-dotnet

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: dotnet format MyCompany.MyShop.Backend.slnx --verify-no-changes
        working-directory: system/multitier/backend-dotnet

      - name: Install dotnet-sonarscanner
        uses: optivem/actions/retry@v1
        with:
          command: dotnet tool install --global dotnet-sonarscanner

      - name: Begin Sonar Analysis
        run: |
          dotnet sonarscanner begin /k:"optivem_shop-multitier-backend-dotnet" /n:"shop-multitier-backend-dotnet" /o:"optivem" /d:sonar.token="${SONAR_TOKEN}" /d:sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5 /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2699 /d:sonar.issue.ignore.multicriteria.e1.resourceKey="Tests/**" /d:sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S1118 /d:sonar.issue.ignore.multicriteria.e2.resourceKey="Program.cs" /d:sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S2068 /d:sonar.issue.ignore.multicriteria.e3.resourceKey="appsettings.json" /d:sonar.issue.ignore.multicriteria.e4.ruleKey=csharpsquid:S1075 /d:sonar.issue.ignore.multicriteria.e4.resourceKey="**/*" /d:sonar.issue.ignore.multicriteria.e5.ruleKey=csharpsquid:S3267 /d:sonar.issue.ignore.multicriteria.e5.resourceKey="**/*"
        working-directory: system/multitier/backend-dotnet

      - name: Build for Sonar
        run: dotnet build
        working-directory: system/multitier/backend-dotnet

      - name: End Sonar Analysis
        uses: optivem/actions/retry@v1
        with:
          working-directory: system/multitier/backend-dotnet
          command: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base image mcr.microsoft.com/dotnet/sdk:8.0
        uses: optivem/actions/retry@v1
        with:
          command: docker pull mcr.microsoft.com/dotnet/sdk:8.0

      - name: Pre-pull base image mcr.microsoft.com/dotnet/aspnet:8.0
        uses: optivem/actions/retry@v1
        with:
          command: docker pull mcr.microsoft.com/dotnet/aspnet:8.0

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/backend-dotnet/VERSION

      - name: Compose Dev Version
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}
          prefix: multitier-backend-dotnet

      - name: Log in to GHCR
        if: steps.check-on-main.outputs.on-branch == 'true'
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-backend-dotnet
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }},enable=${{ steps.check-on-main.outputs.on-branch == 'true' }}

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/backend-dotnet
          file: system/multitier/backend-dotnet/Dockerfile
          push: ${{ steps.check-on-main.outputs.on-branch == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: digest-url
        uses: optivem/actions/compose-digest-url@v1
        with:
          base-image-url: ghcr.io/${{ github.repository }}/multitier-backend-dotnet
          digest: ${{ steps.push.outputs.digest }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

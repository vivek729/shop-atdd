name: multitier-frontend-react-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '!system/multitier/frontend-react/VERSION'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '!system/multitier/frontend-react/VERSION'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.digest-url.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Check commit is on main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/frontend-react/VERSION

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/multitier/frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/multitier/frontend-react

      - name: Compile Code
        run: npm run build
        working-directory: system/multitier/frontend-react

      # TODO: No frontend test suite is wired up yet (no `test` script in package.json).
      # Add jest/vitest + components tests, then replace this with `npm test`.
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: npm run lint
        working-directory: system/multitier/frontend-react

      - name: Run Code Analysis
        uses: optivem/actions/retry@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          working-directory: system/multitier/frontend-react
          command: bash ./run-sonar.sh

      - name: Compose Dev Version
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}
          prefix: multitier-frontend-react

      - name: Log in to GHCR
        if: steps.check-on-main.outputs.on-branch == 'true'
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-frontend-react
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }},enable=${{ steps.check-on-main.outputs.on-branch == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base image node:22-alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull node:22-alpine

      - name: Pre-pull base image nginx:alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull nginx:alpine

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/frontend-react
          file: system/multitier/frontend-react/Dockerfile
          push: ${{ steps.check-on-main.outputs.on-branch == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: digest-url
        shell: bash
        run: echo "value=ghcr.io/${{ github.repository }}/multitier-frontend-react@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # OPTIONAL opt-in layer — NOT part of the default build/commit gate.
  # Exercises the in-process component + consumer Pact contract suites that the
  # default `npm test` deliberately excludes (they run via vitest.opt-in.config.ts).
  # Runs in parallel with `run` and does not gate image build/push. No compose,
  # no broker — the consumer pact is written to / read from the repo-owned
  # `contracts/` folder. Students who clone never run these by default; delete
  # this job to drop the layer.
  # ─────────────────────────────────────────────────────────────────────────
  component-contract-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/multitier/frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/multitier/frontend-react

      - name: Run Component Tests (opt-in)
        run: npm run test:component
        working-directory: system/multitier/frontend-react

      - name: Run Contract (Pact) Tests (opt-in)
        run: npm run test:pact
        working-directory: system/multitier/frontend-react

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

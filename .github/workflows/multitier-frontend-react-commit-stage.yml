name: multitier-frontend-react-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '!system/multitier/frontend-react/VERSION'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '!system/multitier/frontend-react/VERSION'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
    outputs:
      image-digest-url: ${{ steps.digest-url.outputs.digest-url }}
    steps:
      # === Checkout Code ===
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      # <> Should Publish Docker Image? <>
      - name: Check Commit on Main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      # === Compile Code ===
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/multitier/frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/multitier/frontend-react

      - name: Install gh-optivem CLI Extension
        uses: optivem/actions/install-gh-optivem@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Typecheck production + component-test sources up front (the component's
      # compileCommands in component-tests.yaml) so a compile error fails fast before the
      # gating suites.
      - name: Compile Code
        run: gh optivem component-test compile --component frontend

      # === Run Test Pyramid (gates the image) ===
      # Suites are selected from system/multitier/frontend-react/component-tests.yaml via the
      # gh-optivem CLI, so the suite→command mapping has a single source of truth. They run
      # in pyramid order ahead of Build/Push, so a red suite blocks the Docker image.
      # Frontend is the consumer side — no provider-verification suite.
      # One setup covers every suite (it runs the component's suite-agnostic setupCommands).

      - name: Set Up Component Test Harness
        run: gh optivem component-test setup --component frontend

      - name: Run Unit Tests
        run: gh optivem component-test run --component frontend --suite unit

      - name: Run Narrow Integration Tests
        run: gh optivem component-test run --component frontend --suite integration

      - name: Run Component Tests
        run: gh optivem component-test run --component frontend --suite component

      # === Push Contract to Backend Repo ===
      - name: Push contract to backend repo
        if: |
          steps.check-on-main.outputs.on-branch == 'true' &&
          endsWith(github.repository, '-frontend')
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          BACKEND_REPO="${GITHUB_REPOSITORY%-frontend}-backend"
          git clone --depth=1 "https://x-access-token:${REPO_TOKEN}@github.com/${BACKEND_REPO}.git" /tmp/backend-repo
          mkdir -p /tmp/backend-repo/contracts
          cp contracts/frontend-backend.json /tmp/backend-repo/contracts/frontend-backend.json
          cd /tmp/backend-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add contracts/frontend-backend.json
          if git diff --cached --quiet; then
            echo "No contract changes to push."
          else
            git commit -m "chore: update pact contract from frontend consumer CI"
            git push
          fi

      # === Run Linter ===
      - name: Run Linter
        run: npm run lint
        working-directory: system/multitier/frontend-react

      # === Run Static Code Analysis ===
      - name: Run Code Analysis
        uses: optivem/actions/retry@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          working-directory: system/multitier/frontend-react
          command: bash ./run-sonar.sh

      # === Build Docker Image ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base image node:22-alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull node:22-alpine

      - name: Pre-pull base image nginx:alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull nginx:alpine

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/frontend-react/VERSION

      - name: Compose Dev Version
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}
          prefix: multitier-frontend-react

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-frontend-react
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }},enable=${{ steps.check-on-main.outputs.on-branch == 'true' }}

      # === Publish Docker Image ===
      - name: Log in to GHCR
        if: steps.check-on-main.outputs.on-branch == 'true'
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/frontend-react
          file: system/multitier/frontend-react/Dockerfile
          push: ${{ steps.check-on-main.outputs.on-branch == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: digest-url
        uses: optivem/actions/compose-digest-url@v1
        with:
          base-image-url: ghcr.io/${{ github.repository }}/multitier-frontend-react
          digest: ${{ steps.push.outputs.digest }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

name: multitier-backend-java-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '!system/multitier/backend-java/VERSION'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '!system/multitier/backend-java/VERSION'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.base-version }}
      image-digest-url: ${{ steps.digest-url.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/backend-java/VERSION

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system/multitier/backend-java && ./gradlew --version

      - name: Compile Code
        run: ./gradlew build
        working-directory: system/multitier/backend-java

      - name: Run Unit Tests
        run: ./gradlew test
        working-directory: system/multitier/backend-java

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: ./gradlew checkstyleMain
        working-directory: system/multitier/backend-java

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        run: ./gradlew build sonar --info
        working-directory: system/multitier/backend-java

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}

      - name: Log in to GHCR
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker Metadata
        if: steps.verify-main.outputs.on-branch == 'true'
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-backend-java
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base images (retry transient registry 403s)
        if: steps.verify-main.outputs.on-branch == 'true'
        shell: bash
        run: |
          set -e
          for image in eclipse-temurin:21-jdk-alpine eclipse-temurin:21-jre-alpine; do
            for attempt in 1 2 3; do
              if docker pull "$image"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "FATAL: failed to pull $image after 3 attempts" >&2
                exit 1
              fi
              echo "Pull failed for $image (attempt $attempt/3); retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            done
          done

      - name: Build and Push Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/backend-java
          file: system/multitier/backend-java/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.verify-main.outputs.on-branch == 'true'
        id: digest-url
        shell: bash
        run: echo "value=ghcr.io/${{ github.repository }}/multitier-backend-java@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

name: multitier-backend-java-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '!system/multitier/backend-java/VERSION'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '!system/multitier/backend-java/VERSION'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.digest-url.outputs.digest-url }}
    steps:
      # === Checkout Code ===
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      # <> Should Publish Docker Image? <>
      - name: Check Commit on Main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      # === Compile Code ===
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system/multitier/backend-java && ./gradlew --version

      - name: Compile Code
        run: ./gradlew compileJava compileTestJava
        working-directory: system/multitier/backend-java

      # === Run Unit Tests ===
      - name: Run Unit Tests
        run: ./gradlew test
        working-directory: system/multitier/backend-java

      # === Run Narrow Integration Tests ===
      # Skipped: not implemented yet
      - name: Run Narrow Integration Tests
        if: false
        run: echo "not yet implemented"

      # === Run Component Tests ===
      # Skipped: not implemented yet
      - name: Run Component Tests
        if: false
        run: echo "not yet implemented"

      # === Run Contract Tests ===
      # Skipped: not implemented yet
      - name: Run Contract Tests
        if: false
        run: echo "not yet implemented"

      # === Run Linter ===
      - name: Run Linter
        run: ./gradlew checkstyleMain
        working-directory: system/multitier/backend-java

      # === Run Static Code Analysis ===
      # Reuses main classes from "Compile Code" + jacoco report from "Run Unit Tests" (./gradlew test, finalizedBy jacocoTestReport)
      - name: Run Code Analysis
        uses: optivem/actions/retry@v1
        with:
          working-directory: system/multitier/backend-java
          command: ./gradlew sonar --info -Dsonar.scanner.skipJreProvisioning=true

      # === Build Docker Image ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base image eclipse-temurin:21-jdk-alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull eclipse-temurin:21-jdk-alpine

      - name: Pre-pull base image eclipse-temurin:21-jre-alpine
        uses: optivem/actions/retry@v1
        with:
          command: docker pull eclipse-temurin:21-jre-alpine

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/backend-java/VERSION

      - name: Compose Dev Version
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}
          prefix: multitier-backend-java

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ghcr.io/${{ github.repository }}/multitier-backend-java
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }},enable=${{ steps.check-on-main.outputs.on-branch == 'true' }}

      # === Publish Docker Image ===
      - name: Log in to GHCR
        if: steps.check-on-main.outputs.on-branch == 'true'
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: system/multitier/backend-java
          file: system/multitier/backend-java/Dockerfile
          push: ${{ steps.check-on-main.outputs.on-branch == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.check-on-main.outputs.on-branch == 'true'
        id: digest-url
        uses: optivem/actions/compose-digest-url@v1
        with:
          base-image-url: ghcr.io/${{ github.repository }}/multitier-backend-java
          digest: ${{ steps.push.outputs.digest }}

  # ─────────────────────────────────────────────────────────────────────────
  # OPTIONAL opt-in layer — NOT part of the default build/commit gate.
  # Exercises the in-process component + Pact contract tests that live in the
  # `componentTest` source set (kept off `./gradlew build`/`test`). Runs in
  # parallel with `run` and does not gate image build/push. Students who clone
  # the template never run these by default; delete this job to drop the layer.
  # Requires Docker for Testcontainers-Postgres (provided on ubuntu-latest).
  # ─────────────────────────────────────────────────────────────────────────
  component-contract-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system/multitier/backend-java && ./gradlew --version

      - name: Run Component + Contract Tests (opt-in)
        run: ./gradlew componentTest
        working-directory: system/multitier/backend-java

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}

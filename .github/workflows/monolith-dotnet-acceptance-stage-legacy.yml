name: monolith-dotnet-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string
      debug-skip-tests:
        description: 'DEBUG ONLY: skip the legacy run job entirely. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false
      force-run:
        description: 'Bypass the no-changes run gate — execute the legacy acceptance tests even when no artifacts or test/workflow changes are detected since the last RC tag. Meta-prerelease sets this so every dispatched run actually exercises the stage.'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: monolith-dotnet-acceptance-stage-legacy

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ inputs.force-run == true || steps.artifacts-changed.outputs.newer == 'true' || steps.test-changes.outputs.changed == 'true' }}
      skip-reason: ${{ inputs.force-run != true && (steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true') && 'No new artifacts since last run AND no test/workflow changes since last RC tag.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: monolith-dotnet-v*-rc.*
          paths: |
            system-test/dotnet
            .github/workflows/monolith-dotnet-acceptance-stage-legacy.yml

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true' && !inputs.debug-skip-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GH_OPTIVEM_CONFIG: gh-optivem-monolith-dotnet-legacy.yaml
      ENVIRONMENT: acceptance
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      # Authenticated pulls get higher Docker Hub rate limits (anonymous pulls are throttled on shared-IP runners).
      - name: Log in to Docker Hub
        uses: optivem/actions/docker-login@v1
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/dotnet/monolith

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3211/" },
              { "name": "MyShop API", "url": "http://localhost:8211/health" },
              { "name": "ERP", "url": "http://localhost:9211/erp/health" },
              { "name": "Clock", "url": "http://localhost:9211/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/dotnet/monolith

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/dotnet/monolith

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3212/" },
              { "name": "MyShop API", "url": "http://localhost:8212/health" },
              { "name": "ERP", "url": "http://localhost:9212/erp/health" },
              { "name": "Clock", "url": "http://localhost:9212/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/dotnet/monolith

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Compile System Tests
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Install Playwright Browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/dotnet
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium

      - name: Install gh-optivem CLI extension
        uses: optivem/actions/retry@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: gh extension install optivem/gh-optivem

      - name: Setup Test Harness
        run: gh optivem test setup

      - name: mod02-smoke
        run: gh optivem test run --suite mod02-smoke
      - name: mod03-e2e
        run: gh optivem test run --suite mod03-e2e
      - name: mod04-smoke
        run: gh optivem test run --suite mod04-smoke
      - name: mod04-e2e
        run: gh optivem test run --suite mod04-e2e
      - name: mod05-smoke
        run: gh optivem test run --suite mod05-smoke
      - name: mod05-e2e
        run: gh optivem test run --suite mod05-e2e
      - name: mod06-smoke
        run: gh optivem test run --suite mod06-smoke
      - name: mod06-e2e-api
        run: gh optivem test run --suite mod06-e2e-api
      - name: mod06-e2e-ui
        run: gh optivem test run --suite mod06-e2e-ui
      - name: mod07-smoke
        run: gh optivem test run --suite mod07-smoke
      - name: mod07-e2e-api
        run: gh optivem test run --suite mod07-e2e-api
      - name: mod07-e2e-ui
        run: gh optivem test run --suite mod07-e2e-ui
      - name: mod08-smoke
        run: gh optivem test run --suite mod08-smoke
      - name: mod08-e2e-api
        run: gh optivem test run --suite mod08-e2e-api
      - name: mod08-e2e-ui
        run: gh optivem test run --suite mod08-e2e-ui
      - name: mod09-smoke-stub
        run: gh optivem test run --suite mod09-smoke-stub
      - name: mod09-smoke-real
        run: gh optivem test run --suite mod09-smoke-real
      - name: mod10-acceptance-api
        run: gh optivem test run --suite mod10-acceptance-api
      - name: mod10-acceptance-ui
        run: gh optivem test run --suite mod10-acceptance-ui
      - name: mod10-acceptance-isolated-api
        run: gh optivem test run --suite mod10-acceptance-isolated-api
      - name: mod10-acceptance-isolated-ui
        run: gh optivem test run --suite mod10-acceptance-isolated-ui
      - name: mod11-contract-stub
        run: gh optivem test run --suite mod11-contract-stub
      - name: mod11-contract-stub-isolated
        run: gh optivem test run --suite mod11-contract-stub-isolated
      - name: mod11-contract-real
        run: gh optivem test run --suite mod11-contract-real
      - name: mod11-e2e-api
        run: gh optivem test run --suite mod11-e2e-api
      - name: mod11-e2e-ui
        run: gh optivem test run --suite mod11-e2e-ui
  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.run.result }}
        environment: acceptance
        success-version: latest
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

name: meta-prerelease-stage

run-name: >-
  meta-prerelease-stage${{ inputs.debug-skip-tests && ' [debug-skip-tests]' || '' }}${{ inputs.fail-fast && ' [fail-fast]' || '' }}

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours — gated, only runs if there are new commits since the last run
    - cron: '0 7 * * 1'    # Mondays 07:00 UTC — weekly heartbeat, runs unconditionally
  workflow_dispatch:
    inputs:
      debug-skip-tests:
        description: 'DEBUG ONLY: run the full meta pipeline (commit + pipeline + per-flavor prereleases) but bypass the slow acceptance-stage tests, the acceptance-stage-legacy run, the local-mode job, and cross-lang regression. Flavor rcs and meta-rc are still minted, so meta-release-stage can promote afterward. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false
      fail-fast:
        description: 'When true, the first failing matrix entry cancels its siblings. Default false lets every variant run to completion.'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      trigger-name: ${{ steps.trigger.outputs.name }}
    steps:
      - name: Print Inputs
        run: |
          echo "event=${{ github.event_name }} schedule='${{ github.event.schedule }}'"
          echo "debug-skip-tests=${{ inputs.debug-skip-tests }}"
          echo "fail-fast=${{ inputs.fail-fast }}"

      - name: Resolve Trigger Name
        id: trigger
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            name='manual'
          elif [[ "$SCHEDULE" == '0 */3 * * *' ]]; then
            name='gated-3h'
          elif [[ "$SCHEDULE" == '0 7 * * 1' ]]; then
            name='weekly-heartbeat'
          else
            name='unrecognized-schedule'
            echo "::warning::Unrecognized schedule expression '$SCHEDULE' — gate will fail-open and run the pipeline."
          fi
          echo "Trigger: $name (event=$EVENT_NAME, schedule='$SCHEDULE')"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Last Meta Release Tag
        id: last-release
        shell: bash
        run: |
          set -euo pipefail
          # Find the most recent final meta release tag (excluding -rc.* prereleases).
          # If none exists (bootstrap), leave the output empty and let the next step run.
          # Capture stderr so a real git failure (corrupt repo, missing remote)
          # doesn't get conflated with the legitimate "no matching tag" case.
          err_file=$(mktemp)
          if last=$(git describe --tags --abbrev=0 --match='meta-v*' --exclude='*-rc.*' 2>"$err_file"); then
            rm -f "$err_file"
            echo "Last meta release tag: $last"
            echo "tag=$last" >> "$GITHUB_OUTPUT"
          else
            rc=$?
            err=$(cat "$err_file")
            rm -f "$err_file"
            if [[ "$err" == *"No names found"* ]] || [[ "$err" == *"No annotated tags"* ]] || [[ "$err" == *"cannot describe"* ]]; then
              echo "No prior meta-v* release tag found — bootstrap mode, will run."
              echo "tag=" >> "$GITHUB_OUTPUT"
            else
              echo "::error::'git describe' failed (exit $rc) with unexpected error:"
              echo "$err" >&2
              exit "$rc"
            fi
          fi

      - name: Detect Real Source Changes Since Last Release
        id: real-changes
        shell: bash
        env:
          LAST_RELEASE: ${{ steps.last-release.outputs.tag }}
        run: |
          set -euo pipefail
          # Bootstrap: no prior release means we always run.
          if [[ -z "$LAST_RELEASE" ]]; then
            echo "has-real-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # List unique paths changed since the last release. The empty
          # `--pretty=format:` strips per-commit headers so we get a flat list.
          changed=$(git log --name-only --pretty=format: "$LAST_RELEASE..HEAD" \
            | sort -u | grep -v '^$' || true)

          if [[ -z "$changed" ]]; then
            echo "No file changes since $LAST_RELEASE."
            echo "has-real-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files changed since $LAST_RELEASE:"
          # shellcheck disable=SC2001 # ^-anchored line-prefix needs sed; parameter expansion can't do per-line transforms
          sed 's/^/  /' <<< "$changed"
          echo

          # Anything whose basename is exactly "VERSION" is a bump-loop artifact
          # produced by bump-patch-version — ignore it. Anything else is real.
          non_version=$(echo "$changed" | grep -v -E '(^|/)VERSION$' || true)

          if [[ -z "$non_version" ]]; then
            echo "All changes are VERSION-file bumps — no real source changes."
            echo "has-real-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Real (non-VERSION) source changes detected:"
            # shellcheck disable=SC2001 # ^-anchored line-prefix needs sed; parameter expansion can't do per-line transforms
            sed 's/^/  /' <<< "$non_version"
            echo "has-real-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.trigger.outputs.name == 'gated-3h' && steps.real-changes.outputs.has-real-changes != 'true' }}, "reason": "Gated 3-hour run skipped — only VERSION-file bumps (or no changes) since the last meta release. Weekly heartbeat will still fire."}
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    permissions:
      contents: read
      actions: write
      packages: read
    uses: ./.github/workflows/_meta-prerelease-pipeline.yml
    secrets: inherit
    with:
      level: qa
      variant: all
      skip-local: false
      debug-skip-tests: ${{ inputs.debug-skip-tests || false }}
      fail-fast: ${{ inputs.fail-fast || false }}

  tag-meta-rc:
    # Tag SHA as meta-rc once `run` (per-flavor pipeline + cross-lang regression
    # check, both gated on commit inside `_meta-prerelease-pipeline.yml`) has
    # settled successfully — produces the tag that triggers meta-release-stage.
    # Uses !failure() && !cancelled() so a clean skip (e.g. cross-lang skipped
    # by debug-skip-tests) still permits tagging, while any failure inside
    # `run` blocks it.
    #
    # We tag `needs.run.outputs.commit_sha`, not `github.sha`, because
    # `_meta-prerelease-pipeline.yml`'s check job may have auto-bumped via
    # meta-bump-all and re-pinned downstream verification to the post-bump
    # main HEAD. github.sha would be the pre-bump trigger SHA, which is no
    # longer the SHA that was actually verified.
    needs: [check, run]
    if: ${{ !failure() && !cancelled() && needs.check.outputs.should-run == 'true' && needs.run.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve Verified SHA
        id: sha
        shell: bash
        env:
          VERIFIED_SHA: ${{ needs.run.outputs.commit_sha }}
          ORIGINAL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          sha="${VERIFIED_SHA:-$ORIGINAL_SHA}"
          echo "value=$sha" >> "$GITHUB_OUTPUT"
          echo "Tagging meta-rc against SHA: $sha (original github.sha=$ORIGINAL_SHA)"
      # fetch-depth: 0 so build-flavor-rc-manifest can see every flavor RC tag
      # when probing for the latest qa-approved RC at each flavor.VERSION.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.VERIFY_TOKEN }}
          ref: ${{ steps.sha.outputs.value }}
          fetch-depth: 0
      - name: Read Meta VERSION
        id: meta-version
        shell: bash
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      # Build the per-flavor manifest BEFORE tagging. The meta-rc tag is
      # annotated with this manifest as its body so meta-release-stage promotes
      # exactly the RCs that were tested together — see
      # plans/20260514-0652-shop-meta-release-manifest.md.
      - name: Build per-flavor manifest
        uses: ./.github/actions/build-flavor-rc-manifest
        with:
          output-file: manifest.json
          meta-rc: meta-v${{ steps.meta-version.outputs.value }}-rc.${{ github.run_number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Echo manifest
        shell: bash
        run: |
          echo "Manifest:"
          cat manifest.json
      - name: Create annotated meta-rc tag
        env:
          VERIFIED_SHA: ${{ steps.sha.outputs.value }}
          TAG: meta-v${{ steps.meta-version.outputs.value }}-rc.${{ github.run_number }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Creating annotated tag ${TAG} on ${VERIFIED_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Annotated tag with manifest as body — meta-release-stage reads it
          # back via `git cat-file -p <tag>` to know which RCs to promote.
          git tag -a "$TAG" -F manifest.json "${VERIFIED_SHA}"
      - name: Push meta-rc tag
        uses: optivem/actions/retry@v1
        with:
          command: git push origin "meta-v${{ steps.meta-version.outputs.value }}-rc.${{ github.run_number }}"
      - name: Tag meta-rc summary
        env:
          VERIFIED_SHA: ${{ steps.sha.outputs.value }}
          TAG: meta-v${{ steps.meta-version.outputs.value }}-rc.${{ github.run_number }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Tagged ${VERIFIED_SHA} as ${TAG}"
          TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          {
            echo "## Meta RC tagged"
            echo ""
            echo "- Tag: [\`${TAG}\`](${TAG_URL})"
            echo "- Commit: [\`${VERIFIED_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${VERIFIED_SHA})"
            echo ""
            echo "### Manifest"
            echo ""
            echo '```json'
            cat manifest.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

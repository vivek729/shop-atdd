name: cross-lang-system-verification

# Verifies behavior parity across system languages: each test-lang's suite
# is run against every other system-lang's SUT (Java tests vs .NET system,
# .NET tests vs TypeScript system, etc.). Same-lang-vs-same-system combos
# are excluded — they are already covered by the per-(arch, lang)
# acceptance stages.
#
# Reusable workflow only — invoked from `_meta-prerelease-pipeline.yml`
# (sibling of the `pipeline` job, both `needs: commit`). No standalone
# triggers: cross-lang resolves `sha-<sha>` images from GHCR that only
# exist after the per-lang commit stages have run, so a schedule or
# manual dispatch run could only succeed by accident.
#
# Inside the pipeline cross-lang IS a release gate — `tag-meta-rc` only
# fires when both `pipeline` and `cross-lang` settle successfully.

on:
  workflow_call:
    inputs:
      commit-sha:
        description: 'Git SHA to test — must point at a SHA whose commit-stage images exist in GHCR.'
        required: true
        type: string

permissions: {}

concurrency:
  group: cross-lang-system-verification
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  verify:
    name: ${{ matrix.test-lang }} tests vs ${{ matrix.arch }} ${{ matrix.system-lang }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      # Independent regression signals — one failing combo must not mask the others.
      fail-fast: false
      matrix:
        arch: [monolith, multitier]
        test-lang: [java, dotnet, typescript]
        system-lang: [java, dotnet, typescript]
        exclude:
          # Same-lang combos are covered by <arch>-<lang>-acceptance-stage.yml.
          - { test-lang: java,       system-lang: java }
          - { test-lang: dotnet,     system-lang: dotnet }
          - { test-lang: typescript, system-lang: typescript }
        include:
          # Per (arch, system-lang) image set + compose service names.
          # Mirrors the per-(arch, lang)-acceptance-stage.yml deployments.
          - arch: monolith
            system-lang: java
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-java
            sut-service-names: |
              system
          - arch: monolith
            system-lang: dotnet
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet
            sut-service-names: |
              system
          - arch: monolith
            system-lang: typescript
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
            sut-service-names: |
              system
          - arch: multitier
            system-lang: java
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
            sut-service-names: |
              frontend
              backend
          - arch: multitier
            system-lang: dotnet
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet
            sut-service-names: |
              frontend
              backend
          - arch: multitier
            system-lang: typescript
            sut-base-image-urls: |
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
              ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript
            sut-service-names: |
              frontend
              backend
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GHCR_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        if: matrix.test-lang == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        if: matrix.test-lang == 'java'
        uses: gradle/actions/setup-gradle@v6

      - name: Setup .NET
        if: matrix.test-lang == 'dotnet'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        if: matrix.test-lang == 'typescript'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: digests
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: ${{ matrix.sut-base-image-urls }}
          tag: sha-${{ env.COMMIT_SHA }}

      - name: Compute Endpoint Lists from systems.yaml
        id: endpoints
        # systems.yaml's components + externalSystems already have {name, url}
        # in the shape wait-for-endpoints expects. Extract per stub/real label
        # so each compose deployment is verified against its own URL set.
        run: |
          SYSTEM_JSON=docker/${{ matrix.system-lang }}/${{ matrix.arch }}/systems.yaml
          REAL_JSON=$(jq -c '.systems[] | select(.label == "real") | [(.components + .externalSystems)[] | {name, url}]' "$SYSTEM_JSON")
          STUB_JSON=$(jq -c '.systems[] | select(.label == "stub") | [(.components + .externalSystems)[] | {name, url}]' "$SYSTEM_JSON")
          {
            echo "real<<EOF"
            echo "$REAL_JSON"
            echo "EOF"
            echo "stub<<EOF"
            echo "$STUB_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy SUT (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: cross-lang
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ steps.digests.outputs.image-digest-urls }}
          service-names: ${{ matrix.sut-service-names }}
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/${{ matrix.system-lang }}/${{ matrix.arch }}

      - name: Wait for SUT (Real External Systems)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: ${{ steps.endpoints.outputs.real }}
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/${{ matrix.system-lang }}/${{ matrix.arch }}

      - name: Deploy SUT (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: cross-lang
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ steps.digests.outputs.image-digest-urls }}
          service-names: ${{ matrix.sut-service-names }}
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/${{ matrix.system-lang }}/${{ matrix.arch }}

      - name: Wait for SUT (Stub External Systems)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: ${{ steps.endpoints.outputs.stub }}
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/${{ matrix.system-lang }}/${{ matrix.arch }}

      - name: Export SUT URL env vars from systems.yaml
        # Test code defaults to its own language's port set (3[1|2|3]xx). For cross-lang
        # runs the test process must point at the SUT's port set instead. Each loader
        # checks env vars after loading its config file; this step exports the 10
        # mode-suffixed URLs (5 keys × _REAL/_STUB) extracted from the SUT's systems.yaml.
        # Tax is not in externalSystems but is colocated with ERP — derived by URL swap.
        run: |
          SYSTEM_JSON=docker/${{ matrix.system-lang }}/${{ matrix.arch }}/systems.yaml
          for label in real stub; do
            SUFFIX=$(echo "$label" | tr '[:lower:]' '[:upper:]')
            UI_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .components[0].url' "$SYSTEM_JSON")
            API_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .components[1].url' "$SYSTEM_JSON" | sed 's|/health$||')
            ERP_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .externalSystems[] | select(.name | test("ERP")) | .url' "$SYSTEM_JSON" | sed 's|/health$||')
            CLOCK_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .externalSystems[] | select(.name | test("Clock")) | .url' "$SYSTEM_JSON" | sed 's|/health$||')
            TAX_URL="${ERP_URL%/erp}/tax"
            {
              echo "MYSHOP_UI_BASE_URL_${SUFFIX}=${UI_URL}"
              echo "MYSHOP_API_BASE_URL_${SUFFIX}=${API_URL}"
              echo "ERP_API_BASE_URL_${SUFFIX}=${ERP_URL}"
              echo "CLOCK_API_BASE_URL_${SUFFIX}=${CLOCK_URL}"
              echo "TAX_API_BASE_URL_${SUFFIX}=${TAX_URL}"
            } >> "$GITHUB_ENV"
          done
          echo "::group::Exported URL env vars"
          grep -E '^(MYSHOP|ERP|CLOCK|TAX)_' "$GITHUB_ENV" || true
          echo "::endgroup::"

      - name: Run ${{ matrix.test-lang }} latest system tests vs ${{ matrix.system-lang }} SUT
        # --no-build / --no-start: SUT lifecycle is owned by deploy-docker-compose
        # above. The runner just executes setupCommands + suites from tests-latest.yaml.
        run: gh optivem test system --no-build --no-start --system-config docker/${{ matrix.system-lang }}/${{ matrix.arch }}/systems.yaml --test-config system-test/${{ matrix.test-lang }}/tests-latest.yaml

      - name: Run ${{ matrix.test-lang }} legacy system tests vs ${{ matrix.system-lang }} SUT
        # Legacy suites are pinned to historical module versions. We run them against
        # the same SUT that just hosted latest — reuses the deployment, doubles the
        # signal per matrix entry. `if: always()` so a latest-suite failure does NOT
        # short-circuit legacy: both signals are reported independently in the job log,
        # and the matrix entry surfaces red if either is red.
        if: always()
        run: gh optivem test system --no-build --no-start --system-config docker/${{ matrix.system-lang }}/${{ matrix.arch }}/systems.yaml --test-config system-test/${{ matrix.test-lang }}/tests-legacy.yaml

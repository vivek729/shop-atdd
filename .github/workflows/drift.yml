name: drift

# Cross-language schema drift jobs (decision #7 of
# `plans/20260513-1530-shop-canonical-db-schema-via-migrations.md` in the
# gh-optivem repo).
#
# Sequence per architecture:
#   1. Bring up Java's `real` and `stub` compose files. `db-migrate` applies
#      the canonical Flyway migration set to each project's postgres-data
#      volume (`my-shop-real_postgres-data`, `my-shop-stub_postgres-data`).
#   2. Run the Java smoke-stub suite. (`gh optivem test run` preflights
#      every system label in systems.yaml — both `real` and `stub` URLs
#      must respond — so both compose stacks have to be up.)
#   3. `docker compose down` Java's stacks. Containers go away; the named
#      postgres-data volumes persist because we omit `-v`.
#   4. Bring up TypeScript's `real` and `stub` compose files. They share
#      compose project names (`my-shop-real`, `my-shop-stub`) with Java,
#      so the existing postgres-data volumes are reused. Flyway re-runs,
#      finds flyway_schema_history already populated, applies no new
#      migrations. TS SUTs boot against the same schema.
#   5. Run the TypeScript smoke-stub suite.
#
# Both suites green ⇒ the canonical migration set produces a schema that
# both stacks read. The volume share via the `my-shop-stub` project name
# is the explicit drift signal — schema interop in both real and stub mode
# is a bonus. .NET third leg deferred.
#
# Image resolution: when called from `_meta-prerelease-pipeline.yml` (or
# dispatched with a commit-sha), images are pinned to `sha-<commit-sha>`
# digests via `optivem/actions/resolve-docker-image-digests@v1` — matches
# the cross-lang pattern. Standalone / scheduled runs fall back to
# `:latest`, which is what the per-stack commit stages tag for each fresh
# build.

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest images)'
        required: false
        type: string
      gh-optivem-ref:
        description: 'Build & install gh-optivem from this ref (branch/tag/SHA) instead of the latest release. Empty = latest release.'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      commit-sha:
        description: 'Git SHA to test — must point at a SHA whose commit-stage images exist in GHCR.'
        required: true
        type: string
      gh-optivem-ref:
        description: 'Build & install gh-optivem from this ref (branch/tag/SHA) instead of the latest release. Empty = latest release.'
        required: false
        type: string
        default: ''

permissions: {}

concurrency:
  group: drift-${{ github.ref }}
  cancel-in-progress: false

env:
  # When provided (workflow_call from pipeline, or explicit dispatch),
  # pin every SUT image to its commit-stage `sha-<COMMIT_SHA>` digest.
  # When absent (schedule / unprovided dispatch), resolve `:latest` —
  # which the per-stack commit stages tag on every successful build.
  RESOLVED_TAG: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

jobs:
  monolith-drift:
    name: monolith — Java → TS schema interop
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GHCR_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit-sha || github.sha }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        uses: ./.github/actions/install-gh-optivem
        with:
          ref: ${{ inputs.gh-optivem-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: optivem/actions/docker-login@v1
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Java monolith image digests
        id: java-digests
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-java
          tag: ${{ env.RESOLVED_TAG }}

      - name: Resolve TypeScript monolith image digests
        id: ts-digests
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
          tag: ${{ env.RESOLVED_TAG }}

      # ---- Leg 1: Java SUT applies migrations, runs Java suite ----

      - name: Deploy Java monolith real
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.java-digests.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/monolith

      - name: Deploy Java monolith stub
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.java-digests.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/monolith

      - name: Wait for Java SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Java real UI",  "url": "http://localhost:3111/" },
              { "name": "Java real API", "url": "http://localhost:8111/health" },
              { "name": "Java stub UI",  "url": "http://localhost:3112/" },
              { "name": "Java stub API", "url": "http://localhost:8112/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/monolith

      - name: Setup Java test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-java.yaml
        run: gh optivem test setup

      - name: Run Java smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-java.yaml
        run: gh optivem test run --suite smoke-stub

      # ---- Swap apps. Volumes persist because `down` omits `-v`. ----

      - name: Stop Java stacks (preserve postgres-data volumes)
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down
          docker compose -f docker-compose.pipeline.real.yml down
        working-directory: docker/java/monolith

      # ---- Leg 2: TypeScript SUTs inherit the same migrated schemas ----

      - name: Deploy TypeScript monolith real (reuses my-shop-real postgres-data)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.ts-digests.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/monolith

      - name: Deploy TypeScript monolith stub (reuses my-shop-stub postgres-data)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.ts-digests.outputs.image-digest-urls }}
          service-names: system
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Wait for TypeScript SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "TS real UI",  "url": "http://localhost:3311/" },
              { "name": "TS real API", "url": "http://localhost:8311/health" },
              { "name": "TS stub UI",  "url": "http://localhost:3312/" },
              { "name": "TS stub API", "url": "http://localhost:8312/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Setup TypeScript test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-typescript.yaml
        run: gh optivem test setup

      - name: Run TypeScript smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-typescript.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Tear down TypeScript stacks
        if: always()
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down -v
          docker compose -f docker-compose.pipeline.real.yml down -v
        working-directory: docker/typescript/monolith

  multitier-drift:
    name: multitier — Java → TS schema interop
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GHCR_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit-sha || github.sha }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        uses: ./.github/actions/install-gh-optivem
        with:
          ref: ${{ inputs.gh-optivem-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: optivem/actions/docker-login@v1
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Java multitier image digests
        id: java-digests
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          tag: ${{ env.RESOLVED_TAG }}

      - name: Resolve TypeScript multitier image digests
        id: ts-digests
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript
          tag: ${{ env.RESOLVED_TAG }}

      - name: Deploy Java multitier real
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.java-digests.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Deploy Java multitier stub
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.java-digests.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Wait for Java SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Java real UI",  "url": "http://localhost:3111/" },
              { "name": "Java real API", "url": "http://localhost:8111/health" },
              { "name": "Java stub UI",  "url": "http://localhost:3112/" },
              { "name": "Java stub API", "url": "http://localhost:8112/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Setup Java test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
        run: gh optivem test setup

      - name: Run Java smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Stop Java stacks (preserve postgres-data volumes)
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down
          docker compose -f docker-compose.pipeline.real.yml down
        working-directory: docker/java/multitier

      - name: Deploy TypeScript multitier real (reuses my-shop-real postgres-data)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.ts-digests.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/multitier

      - name: Deploy TypeScript multitier stub (reuses my-shop-stub postgres-data)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: drift
          version: ${{ env.RESOLVED_TAG }}
          image-urls: ${{ steps.ts-digests.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/multitier

      - name: Wait for TypeScript SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "TS real UI",  "url": "http://localhost:3311/" },
              { "name": "TS real API", "url": "http://localhost:8311/health" },
              { "name": "TS stub UI",  "url": "http://localhost:3312/" },
              { "name": "TS stub API", "url": "http://localhost:8312/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/multitier

      - name: Setup TypeScript test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-typescript.yaml
        run: gh optivem test setup

      - name: Run TypeScript smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-typescript.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Tear down TypeScript stacks
        if: always()
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down -v
          docker compose -f docker-compose.pipeline.real.yml down -v
        working-directory: docker/typescript/multitier

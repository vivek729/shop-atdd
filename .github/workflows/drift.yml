name: drift

# Cross-language schema drift jobs (decision #7 of
# `plans/20260513-1530-shop-canonical-db-schema-via-migrations.md` in the
# gh-optivem repo).
#
# Sequence per architecture:
#   1. Bring up Java's `real` and `stub` compose files. `db-migrate` applies
#      the canonical Flyway migration set to each project's postgres-data
#      volume (`my-shop-real_postgres-data`, `my-shop-stub_postgres-data`).
#   2. Run the Java smoke-stub suite. (`gh optivem test run` preflights
#      every system label in systems.yaml — both `real` and `stub` URLs
#      must respond — so both compose stacks have to be up.)
#   3. `docker compose down` Java's stacks. Containers go away; the named
#      postgres-data volumes persist because we omit `-v`.
#   4. Bring up TypeScript's `real` and `stub` compose files. They share
#      compose project names (`my-shop-real`, `my-shop-stub`) with Java,
#      so the existing postgres-data volumes are reused. Flyway re-runs,
#      finds flyway_schema_history already populated, applies no new
#      migrations. TS SUTs boot against the same schema.
#   5. Run the TypeScript smoke-stub suite.
#
# Both suites green ⇒ the canonical migration set produces a schema that
# both stacks read. The volume share via the `my-shop-stub` project name
# is the explicit drift signal — schema interop in both real and stub mode
# is a bonus. .NET third leg deferred.

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

permissions: {}

concurrency:
  group: drift-${{ github.ref }}
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  monolith-drift:
    name: monolith — Java → TS schema interop
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GHCR_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      # ---- Leg 1: Java SUT applies migrations, runs Java suite ----

      - name: Bring up Java monolith real
        run: docker compose -f docker-compose.pipeline.real.yml up -d
        working-directory: docker/java/monolith

      - name: Bring up Java monolith stub
        run: docker compose -f docker-compose.pipeline.stub.yml up -d
        working-directory: docker/java/monolith

      - name: Wait for Java SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Java real UI",  "url": "http://localhost:3111/" },
              { "name": "Java real API", "url": "http://localhost:8111/health" },
              { "name": "Java stub UI",  "url": "http://localhost:3112/" },
              { "name": "Java stub API", "url": "http://localhost:8112/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/monolith

      - name: Setup Java test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-java.yaml
        run: gh optivem test setup

      - name: Run Java smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-java.yaml
        run: gh optivem test run --suite smoke-stub

      # ---- Swap apps. Volumes persist because `down` omits `-v`. ----

      - name: Stop Java stacks (preserve postgres-data volumes)
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down
          docker compose -f docker-compose.pipeline.real.yml down
        working-directory: docker/java/monolith

      # ---- Leg 2: TypeScript SUTs inherit the same migrated schemas ----

      - name: Bring up TypeScript monolith real (reuses my-shop-real postgres-data)
        run: docker compose -f docker-compose.pipeline.real.yml up -d
        working-directory: docker/typescript/monolith

      - name: Bring up TypeScript monolith stub (reuses my-shop-stub postgres-data)
        run: docker compose -f docker-compose.pipeline.stub.yml up -d
        working-directory: docker/typescript/monolith

      - name: Wait for TypeScript SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "TS real UI",  "url": "http://localhost:3311/" },
              { "name": "TS real API", "url": "http://localhost:8311/health" },
              { "name": "TS stub UI",  "url": "http://localhost:3312/" },
              { "name": "TS stub API", "url": "http://localhost:8312/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Setup TypeScript test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-typescript.yaml
        run: gh optivem test setup

      - name: Run TypeScript smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-monolith-typescript.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Tear down TypeScript stacks
        if: always()
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down -v
          docker compose -f docker-compose.pipeline.real.yml down -v
        working-directory: docker/typescript/monolith

  multitier-drift:
    name: multitier — Java → TS schema interop
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GHCR_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Bring up Java multitier real
        run: docker compose -f docker-compose.pipeline.real.yml up -d
        working-directory: docker/java/multitier

      - name: Bring up Java multitier stub
        run: docker compose -f docker-compose.pipeline.stub.yml up -d
        working-directory: docker/java/multitier

      - name: Wait for Java SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Java real UI",  "url": "http://localhost:3111/" },
              { "name": "Java real API", "url": "http://localhost:8111/health" },
              { "name": "Java stub UI",  "url": "http://localhost:3112/" },
              { "name": "Java stub API", "url": "http://localhost:8112/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Setup Java test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
        run: gh optivem test setup

      - name: Run Java smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Stop Java stacks (preserve postgres-data volumes)
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down
          docker compose -f docker-compose.pipeline.real.yml down
        working-directory: docker/java/multitier

      - name: Bring up TypeScript multitier real (reuses my-shop-real postgres-data)
        run: docker compose -f docker-compose.pipeline.real.yml up -d
        working-directory: docker/typescript/multitier

      - name: Bring up TypeScript multitier stub (reuses my-shop-stub postgres-data)
        run: docker compose -f docker-compose.pipeline.stub.yml up -d
        working-directory: docker/typescript/multitier

      - name: Wait for TypeScript SUT endpoints (real + stub)
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "TS real UI",  "url": "http://localhost:3311/" },
              { "name": "TS real API", "url": "http://localhost:8311/health" },
              { "name": "TS stub UI",  "url": "http://localhost:3312/" },
              { "name": "TS stub API", "url": "http://localhost:8312/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/multitier

      - name: Setup TypeScript test harness
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-typescript.yaml
        run: gh optivem test setup

      - name: Run TypeScript smoke-stub
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-multitier-typescript.yaml
        run: gh optivem test run --suite smoke-stub

      - name: Tear down TypeScript stacks
        if: always()
        run: |
          docker compose -f docker-compose.pipeline.stub.yml down -v
          docker compose -f docker-compose.pipeline.real.yml down -v
        working-directory: docker/typescript/multitier

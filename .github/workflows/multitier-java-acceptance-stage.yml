name: multitier-java-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string
      debug-skip-tests:
        description: 'DEBUG ONLY: bypass acceptance tests and tag the RC anyway. Produces an RC tag indistinguishable from a tested one. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false
      force-run:
        description: 'Bypass the no-changes run gate — execute the acceptance tests even when no artifacts or test/workflow changes are detected since the last RC tag. Meta-prerelease sets this so every dispatched run actually exercises the stage.'
        required: false
        type: boolean
        default: false
      gh-optivem-ref:
        description: 'Build & install gh-optivem from this ref (branch/tag/SHA) instead of the latest release. Empty = latest release.'
        required: false
        type: string
        default: ''

permissions: {}

concurrency:
  group: multitier-java-acceptance-stage

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  # === Gate: Artifacts Exist? ===
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          token: ${{ secrets.GHCR_TOKEN }}

  # === Should Run? ===
  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
      on-branch: ${{ steps.check-on-main.outputs.on-branch }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      # <> Should Publish RC Tag / Image Tags? <>
      - name: Check Commit on Main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/java/VERSION

      - name: Check System Release Already Published
        id: check-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: multitier-java-v${{ steps.read-base-version.outputs.base-version }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: multitier-java-v*-rc.*
          paths: |
            system-test/java
            .github/workflows/multitier-java-acceptance-stage.yml

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.check-tag.outputs.exists == 'true' }}, "reason": "Release in progress — version already tagged, awaiting post-release VERSION bump."},
              {"when": ${{ inputs.force-run != true && steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true' }}, "reason": "No new artifacts since last run AND no test/workflow changes since last RC tag." }
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-java-acceptance
    permissions:
      contents: read
      packages: write
    env:
      GH_OPTIVEM_CONFIG: gh-optivem-multitier-java.yaml
      # The test suites run without -Denvironment, so this selects Environment.ACCEPTANCE.
      ENVIRONMENT: acceptance
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      # === Checkout Code ===
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      # Authenticated pulls get higher Docker Hub rate limits (anonymous pulls are throttled on shared-IP runners).
      - name: Log in to Docker Hub
        uses: optivem/actions/docker-login@v1
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # === Deploy: Real External Systems ===
      - name: Simulate Deployment (Real External Systems)
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3111/" },
              { "name": "MyShop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      # === Deploy: Stub External Systems ===
      - name: Simulate Deployment (Stub External Systems)
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3112/" },
              { "name": "MyShop API", "url": "http://localhost:8112/health" },
              { "name": "ERP", "url": "http://localhost:9112/erp/health" },
              { "name": "Clock", "url": "http://localhost:9112/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      # === Setup Test Harness ===
      - name: Setup Java
        if: ${{ !inputs.debug-skip-tests }}
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        if: ${{ !inputs.debug-skip-tests }}
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        if: ${{ !inputs.debug-skip-tests }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        if: ${{ !inputs.debug-skip-tests }}
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install gh-optivem CLI extension
        if: ${{ !inputs.debug-skip-tests }}
        uses: optivem/actions/install-gh-optivem@v1
        with:
          ref: ${{ inputs.gh-optivem-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # `gh optivem system-test setup` runs the setupCommands block (gradle clean +
      # compileJava + compileTestJava) once for the whole batch; the
      # per-suite `test system` steps then run against the prepared workspace.
      # The SUT itself was already brought up earlier by the Simulate
      # Deployment / Wait for Systems steps, so no `gh optivem system start` is
      # needed.
      - name: Setup Test Harness
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test setup
      # === Run Smoke Tests ===
      - name: smoke-stub
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite smoke-stub
      - name: smoke-real
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite smoke-real
      # === Run Acceptance Tests ===
      - name: acceptance-parallel-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite acceptance-parallel-api
      - name: acceptance-parallel-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite acceptance-parallel-ui
      - name: acceptance-isolated-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite acceptance-isolated-api
      - name: acceptance-isolated-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite acceptance-isolated-ui
      # === Run Contract Tests ===
      - name: contract-stub
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite contract-stub
      - name: contract-stub-isolated
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite contract-stub-isolated
      - name: contract-real
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite contract-real
      # === Run E2E Tests ===
      - name: e2e-api
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite e2e-api
      - name: e2e-ui
        if: ${{ !inputs.debug-skip-tests }}
        run: gh optivem system-test run --suite e2e-ui
      # === Tag Release Candidate ===
      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/java/VERSION

      - name: Compose Prerelease Version
        if: needs.check.outputs.on-branch == 'true'
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: multitier-java

      - name: Tag Docker Images for Prerelease
        if: needs.check.outputs.on-branch == 'true'
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  # === Publish Git Tag ===
  publish-tag:
    needs: [check, run]
    if: needs.check.outputs.on-branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  # === Run Static Code Analysis ===
  sonar:
    needs: run
    if: ${{ !inputs.debug-skip-tests }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Sonar Analysis
        uses: optivem/actions/retry@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          working-directory: system-test/java
          command: bash ./run-sonar.sh

  summary:
    needs: [preflight, check, run, publish-tag, sonar]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: acceptance
        success-version: ${{ needs.check.outputs.on-branch == 'true' && needs.run.outputs.version || 'not computed — non-main run' }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

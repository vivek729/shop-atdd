name: multitier-java-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string
      debug-skip-tests:
        description: 'DEBUG ONLY: skip the legacy run job entirely. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: multitier-java-acceptance-stage-legacy

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.artifacts-changed.outputs.newer == 'true' || steps.test-changes.outputs.changed == 'true' }}
      skip-reason: ${{ (steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true') && 'No new artifacts since last run AND no test/workflow changes since last RC tag.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: multitier-java-v*-rc.*
          paths: |
            system-test/java
            .github/workflows/multitier-java-acceptance-stage-legacy.yml

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true' && !inputs.debug-skip-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      ENVIRONMENT: acceptance
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3111/" },
              { "name": "MyShop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3112/" },
              { "name": "MyShop API", "url": "http://localhost:8112/health" },
              { "name": "ERP", "url": "http://localhost:9112/erp/health" },
              { "name": "Clock", "url": "http://localhost:9112/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright System Dependencies
        timeout-minutes: 10
        uses: Wandalen/wretry.action@v3
        with:
          command: npx playwright install-deps chromium
          current_path: system-test/java
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install gh-optivem CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      - name: mod02-smoke
        run: gh optivem test system --suite mod02-smoke --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod03-e2e
        run: gh optivem test system --suite mod03-e2e --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod04-smoke
        run: gh optivem test system --suite mod04-smoke --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod04-e2e
        run: gh optivem test system --suite mod04-e2e --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod05-smoke
        run: gh optivem test system --suite mod05-smoke --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod05-e2e
        run: gh optivem test system --suite mod05-e2e --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod06-smoke
        run: gh optivem test system --suite mod06-smoke --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod06-e2e-api
        run: gh optivem test system --suite mod06-e2e-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod06-e2e-ui
        run: gh optivem test system --suite mod06-e2e-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod07-smoke
        run: gh optivem test system --suite mod07-smoke --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod07-e2e-api
        run: gh optivem test system --suite mod07-e2e-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod07-e2e-ui
        run: gh optivem test system --suite mod07-e2e-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod08-smoke
        run: gh optivem test system --suite mod08-smoke --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod08-e2e-api
        run: gh optivem test system --suite mod08-e2e-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod08-e2e-ui
        run: gh optivem test system --suite mod08-e2e-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod09-smoke-stub
        run: gh optivem test system --suite mod09-smoke-stub --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod09-smoke-real
        run: gh optivem test system --suite mod09-smoke-real --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod10-acceptance-api
        run: gh optivem test system --suite mod10-acceptance-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod10-acceptance-ui
        run: gh optivem test system --suite mod10-acceptance-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod10-acceptance-isolated-api
        run: gh optivem test system --suite mod10-acceptance-isolated-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod10-acceptance-isolated-ui
        run: gh optivem test system --suite mod10-acceptance-isolated-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod11-contract-stub
        run: gh optivem test system --suite mod11-contract-stub --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod11-contract-stub-isolated
        run: gh optivem test system --suite mod11-contract-stub-isolated --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod11-contract-real
        run: gh optivem test system --suite mod11-contract-real --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod11-e2e-api
        run: gh optivem test system --suite mod11-e2e-api --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

      - name: mod11-e2e-ui
        run: gh optivem test system --suite mod11-e2e-ui --no-setup --no-build --no-start --system-config docker/java/multitier/system.json --test-config system-test/java/tests-legacy.json

  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.run.result }}
        environment: acceptance
        success-version: latest
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

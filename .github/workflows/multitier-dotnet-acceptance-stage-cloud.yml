name: multitier-dotnet-acceptance-stage-cloud

on:
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

permissions: {}

concurrency:
  group: multitier-dotnet-acceptance-stage-cloud

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.artifacts-changed.outputs.newer == 'true' || steps.test-changes.outputs.changed == 'true' }}
      skip-reason: ${{ (steps.artifacts-changed.outputs.newer != 'true' && steps.test-changes.outputs.changed != 'true') && 'No new artifacts since last run AND no test/workflow changes since last RC tag.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
      on-branch: ${{ steps.check-on-main.outputs.on-branch }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            WORKFLOW_TOKEN
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Check Commit on Main
        id: check-on-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for New Artifacts Since Last Run
        id: artifacts-changed
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.find-latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Detect Test Changes Since Last RC
        id: test-changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: multitier-dotnet-cloud-v*-rc.*
          paths: |
            system-test/dotnet
            .github/workflows/multitier-dotnet-acceptance-stage-cloud.yml

  deploy-frontend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-dotnet-acceptance
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: multitier-dotnet-frontend-acceptance
          image: ${{ fromJson(needs.check.outputs.image-digest-urls)[0] }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=3000 --max-instances=3 --allow-unauthenticated

      - name: Wait for Frontend Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "multitier-dotnet-frontend-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-backend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: multitier-dotnet-backend-acceptance
          image: ${{ fromJson(needs.check.outputs.image-digest-urls)[1] }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Cloud
          secrets: |
            DATABASE_URL=db-connection-string:latest
          flags: --port=8080 --max-instances=3 --allow-unauthenticated

      - name: Wait for Backend Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "multitier-dotnet-backend-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-external-real:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: external-real-acceptance
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=9000 --max-instances=3 --allow-unauthenticated

      - name: Wait for External Real Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "external-real-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-external-stub:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to GHCR
        uses: optivem/actions/docker-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy External Stub to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: external-stub-acceptance
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-stub:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=8080 --max-instances=3 --allow-unauthenticated

      - name: Wait for External Stub Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "external-stub-acceptance", "url": "${{ steps.deploy.outputs.url }}"}]'

  test-smoke-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Smoke Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-smoke-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Smoke Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-acceptance-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-contract-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-stub-isolated:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Stub) (Isolated)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Browsers
        timeout-minutes: 10
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium
        working-directory: system-test/dotnet

      - name: Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  promote:
    needs: [check, deploy-frontend, deploy-backend, test-smoke-real, test-smoke-stub, test-acceptance-api, test-acceptance-ui, test-acceptance-isolated-api, test-acceptance-isolated-ui, test-contract-stub, test-contract-stub-isolated, test-contract-real, test-e2e-api, test-e2e-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/dotnet/VERSION

      - name: Compose Prerelease Version
        if: needs.check.outputs.on-branch == 'true'
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: multitier-dotnet-cloud

      - name: Tag Docker Images for Prerelease
        if: needs.check.outputs.on-branch == 'true'
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  publish-tag:
    needs: [check, promote]
    if: needs.check.outputs.on-branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, promote, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage (Cloud Run)'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.promote.result }}
        environment: acceptance
        success-version: ${{ needs.check.outputs.on-branch == 'true' && needs.promote.outputs.version || 'not computed — non-main run' }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}

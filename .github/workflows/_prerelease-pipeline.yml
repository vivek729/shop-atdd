name: _prerelease-pipeline

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Pipeline prefix (e.g. monolith-java, multitier-dotnet)'
        required: true
        type: string
      architecture:
        description: 'Architecture: monolith or multitier'
        required: true
        type: string
      language:
        description: 'Language: java, dotnet, or typescript'
        required: true
        type: string
      commit-workflows:
        description: 'JSON array of commit-stage workflow filenames'
        required: false
        type: string
        default: '[]'
      skip-local-stage:
        description: 'Skip local stage (when local stages are run externally)'
        required: false
        type: boolean
        default: false
      skip-commit-stage:
        description: 'Skip commit stage (when commit stages are run externally)'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in the local stage and the acceptance-stage-legacy job'
        required: false
        type: boolean
        default: false
      level:
        description: 'Verification level: local, commit, acceptance, or qa'
        required: false
        type: string
        default: 'qa'
      commit-sha:
        description: 'Git SHA to pin the pipeline to (leave empty for HEAD)'
        required: false
        type: string
        default: ''
      debug-skip-tests:
        description: 'DEBUG ONLY: bypass acceptance-stage tests and skip the acceptance-stage-legacy run, while still minting the same RC tag. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false
      gh-optivem-ref:
        description: 'Build & install gh-optivem from this ref (branch/tag/SHA) instead of the latest release. Empty = latest release. Forwarded to the local stage and the acceptance / acceptance-legacy stages.'
        required: false
        type: string
        default: ''

permissions: {}

# Concurrency is set on callers; declaring it here would collide and deadlock (github.workflow resolves to the caller).

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  # Early fail-fast: catch the case where <prefix>-v<VERSION> has been tagged
  # since the meta check-version ran (TOCTOU), or when this pipeline is
  # triggered directly outside of meta. Without this, a released version
  # only gets detected ~20 min later at acceptance-stage.
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base-version: ${{ steps.read-base-version.outputs.base-version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/${{ inputs.architecture }}/${{ inputs.language }}/VERSION

      - name: Check Version Already Released
        id: check-release-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: ${{ inputs.prefix }}-v${{ steps.read-base-version.outputs.base-version }}

      - name: Ensure Version Unreleased
        if: steps.check-release-tag.outputs.exists == 'true'
        shell: bash
        env:
          TAG: ${{ inputs.prefix }}-v${{ steps.read-base-version.outputs.base-version }}
        run: |
          echo "::error::Version $TAG is already released. Bump the VERSION file and create a new RC."
          exit 1

  local:
    needs: check-version
    if: ${{ !inputs.skip-local-stage && needs.check-version.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_OPTIVEM_CONFIG: gh-optivem-${{ inputs.architecture }}-${{ inputs.language }}.yaml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      # Setup runtimes
      - name: Setup Node.js
        if: inputs.language == 'typescript' || inputs.architecture == 'multitier'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: |
            system/monolith/typescript/package-lock.json
            system/multitier/backend-typescript/package-lock.json
            system/multitier/frontend-react/package-lock.json
            system-test/typescript/package-lock.json

      - name: Setup Java
        if: inputs.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: inputs.language == 'java'
        uses: gradle/actions/setup-gradle@v6

      - name: Setup .NET
        if: inputs.language == 'dotnet'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      # Compile source — monolith
      - name: Compile System (monolith, typescript)
        if: inputs.architecture == 'monolith' && inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system/monolith/typescript

      - name: Compile System (monolith, java)
        if: inputs.architecture == 'monolith' && inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system/monolith/java

      - name: Compile System (monolith, dotnet)
        if: inputs.architecture == 'monolith' && inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system/monolith/dotnet

      # Compile source — multitier backend
      - name: Compile Backend (multitier, typescript)
        if: inputs.architecture == 'multitier' && inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system/multitier/backend-typescript

      - name: Compile Backend (multitier, java)
        if: inputs.architecture == 'multitier' && inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system/multitier/backend-java

      - name: Compile Backend (multitier, dotnet)
        if: inputs.architecture == 'multitier' && inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system/multitier/backend-dotnet

      # Compile source — multitier frontend
      - name: Compile Frontend (multitier)
        if: inputs.architecture == 'multitier'
        run: npm ci && npm run build
        working-directory: system/multitier/frontend-react

      # Compile system tests
      - name: Compile System Tests (typescript)
        if: inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system-test/typescript

      - name: Compile System Tests (java)
        if: inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system-test/java

      - name: Compile System Tests (dotnet)
        if: inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system-test/dotnet

      # === Lint (commit-stage parity) ===
      # Mirror the "Run Linter" step from each <prefix>-commit-stage.yml so a
      # green local guarantees a green commit. Run before `system start` to fail
      # fast. Source: the "Run Linter" step in each named *-commit-stage.yml.
      - name: Run Linter (monolith, typescript)
        if: inputs.architecture == 'monolith' && inputs.language == 'typescript'
        run: npm run lint
        working-directory: system/monolith/typescript

      - name: Run Linter (monolith, java)
        if: inputs.architecture == 'monolith' && inputs.language == 'java'
        run: ./gradlew checkstyleMain
        working-directory: system/monolith/java

      - name: Run Linter (monolith, dotnet)
        if: inputs.architecture == 'monolith' && inputs.language == 'dotnet'
        run: dotnet format MyCompany.MyShop.Monolith.sln --verify-no-changes
        working-directory: system/monolith/dotnet

      - name: Run Linter (multitier backend, typescript)
        if: inputs.architecture == 'multitier' && inputs.language == 'typescript'
        run: npm run lint
        working-directory: system/multitier/backend-typescript

      - name: Run Linter (multitier backend, java)
        if: inputs.architecture == 'multitier' && inputs.language == 'java'
        run: ./gradlew checkstyleMain
        working-directory: system/multitier/backend-java

      - name: Run Linter (multitier backend, dotnet)
        if: inputs.architecture == 'multitier' && inputs.language == 'dotnet'
        run: dotnet format MyCompany.MyShop.Backend.slnx --verify-no-changes
        working-directory: system/multitier/backend-dotnet

      # Frontend lint runs in every multitier config (OQ-2b: true superset).
      # Source: multitier-frontend-react-commit-stage.yml (run -> Run Linter).
      - name: Run Linter (multitier frontend)
        if: inputs.architecture == 'multitier'
        run: npm run lint
        working-directory: system/multitier/frontend-react

      # === Unit Tests (commit-stage parity) ===
      # Mirror the "Run Unit Tests" step from each <prefix>-commit-stage.yml.
      # Frontend-react has no unit step (build + lint + component only).
      - name: Run Unit Tests (monolith, typescript)
        if: inputs.architecture == 'monolith' && inputs.language == 'typescript'
        run: npm test
        working-directory: system/monolith/typescript

      - name: Run Unit Tests (monolith, java)
        if: inputs.architecture == 'monolith' && inputs.language == 'java'
        run: ./gradlew test
        working-directory: system/monolith/java

      - name: Run Unit Tests (monolith, dotnet)
        if: inputs.architecture == 'monolith' && inputs.language == 'dotnet'
        run: dotnet test
        working-directory: system/monolith/dotnet

      - name: Run Unit Tests (multitier backend, typescript)
        if: inputs.architecture == 'multitier' && inputs.language == 'typescript'
        run: npm test
        working-directory: system/multitier/backend-typescript

      - name: Run Unit Tests (multitier backend, java)
        if: inputs.architecture == 'multitier' && inputs.language == 'java'
        run: ./gradlew test
        working-directory: system/multitier/backend-java

      # Verbatim mirror of multitier-backend-dotnet-commit-stage.yml: unit only,
      # filtered to the Unit namespace (integration/component/Pact run separately).
      - name: Run Unit Tests (multitier backend, dotnet)
        if: inputs.architecture == 'multitier' && inputs.language == 'dotnet'
        run: dotnet test --filter "FullyQualifiedName~MyCompany.MyShop.Backend.Tests.Unit"
        working-directory: system/multitier/backend-dotnet

      # Install the gh-optivem CLI extension. The extension provides the
      # `gh optivem system start` and `gh optivem system-test run` subcommands
      # used to bring up the docker-compose stacks and run the test suites.
      - name: Install gh-optivem CLI extension
        uses: optivem/actions/install-gh-optivem@v1
        with:
          ref: ${{ inputs.gh-optivem-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # === Component Tests (commit-stage parity) ===
      # Mirror the component-tests job from each <prefix>-commit-stage.yml. Run
      # BEFORE `system start` (OQ-1a) so they fail fast and never collide on
      # ports with the real+stub stack. Uses the job-level GH_OPTIVEM_CONFIG.
      # Source: the component-tests job in each named *-commit-stage.yml.
      - name: Run Component Tests (monolith, typescript)
        if: inputs.architecture == 'monolith' && inputs.language == 'typescript'
        run: |
          gh optivem component-test setup
          gh optivem component-test run

      - name: Run Component Tests (monolith, java)
        if: inputs.architecture == 'monolith' && inputs.language == 'java'
        run: |
          gh optivem component-test setup
          gh optivem component-test run

      - name: Run Component Tests (monolith, dotnet)
        if: inputs.architecture == 'monolith' && inputs.language == 'dotnet'
        run: |
          gh optivem component-test setup
          gh optivem component-test run

      - name: Run Component Tests (multitier backend, typescript)
        if: inputs.architecture == 'multitier' && inputs.language == 'typescript'
        run: |
          gh optivem component-test setup --component backend
          gh optivem component-test run --component backend

      - name: Run Component Tests (multitier backend, java)
        if: inputs.architecture == 'multitier' && inputs.language == 'java'
        run: |
          gh optivem component-test setup --component backend
          gh optivem component-test run --component backend

      - name: Run Component Tests (multitier backend, dotnet)
        if: inputs.architecture == 'multitier' && inputs.language == 'dotnet'
        run: |
          gh optivem component-test setup --component backend
          gh optivem component-test run --component backend

      # Frontend component tests run in every multitier config (OQ-2b: true
      # superset). Source: multitier-frontend-react-commit-stage.yml.
      - name: Run Component Tests (multitier frontend)
        if: inputs.architecture == 'multitier'
        run: |
          gh optivem component-test setup --component frontend
          gh optivem component-test run --component frontend

      # Bring up the docker-compose stacks (real + stub) and wait for health.
      - name: Start system
        run: gh optivem system start

      - name: Setup test harness (latest)
        run: gh optivem system-test setup

      - name: Run System Tests - Latest (Sample)
        run: gh optivem system-test run --sample

      - name: Setup test harness (legacy)
        if: ${{ !inputs.skip-acceptance-legacy }}
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-${{ inputs.architecture }}-${{ inputs.language }}-legacy.yaml
        run: gh optivem system-test setup

      - name: Run System Tests - Legacy (Sample)
        if: ${{ !inputs.skip-acceptance-legacy }}
        env:
          GH_OPTIVEM_CONFIG: gh-optivem-${{ inputs.architecture }}-${{ inputs.language }}-legacy.yaml
        run: gh optivem system-test run --sample

  commit-stage:
    needs: [check-version, local]
    if: ${{ always() && inputs.level != 'local' && !inputs.skip-commit-stage && needs.check-version.result == 'success' && (inputs.skip-local-stage || needs.local.result == 'success') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        workflow: ${{ fromJSON(inputs.commit-workflows) }}
    permissions:
      contents: read
      actions: write
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ matrix.workflow }}
          workflow-inputs: '{"commit-sha": "${{ inputs.commit-sha }}"}'

  acceptance-stage:
    needs: [check-version, local, commit-stage]
    if: ${{ always() && inputs.level != 'local' && inputs.level != 'commit' && needs.check-version.result == 'success' && (inputs.skip-local-stage || needs.local.result == 'success') && (inputs.skip-commit-stage || needs.commit-stage.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.tag }}
    permissions:
      contents: read
      actions: write
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage.yml
          poll-interval: ${{ inputs.debug-skip-tests && '60' || '180' }}
          timeout-seconds: '7200'
          workflow-inputs: '{"commit-sha": "${{ inputs.commit-sha }}", "debug-skip-tests": "${{ inputs.debug-skip-tests }}", "force-run": "true", "gh-optivem-ref": "${{ inputs.gh-optivem-ref }}"}'

      # Resolve the rc tag that actually points at the tested SHA — whether our
      # dispatched run created it or a concurrent scheduled run did. This makes
      # the meta-pipeline race-tolerant with the hourly cron on acceptance-stage.
      - id: get-version
        uses: optivem/actions/resolve-latest-tag-from-sha@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}
          pattern: ${{ inputs.prefix }}-v${{ needs.check-version.outputs.base-version }}-rc.*

      - name: Fail If No RC Tag On SHA
        if: steps.get-version.outputs.tag == ''
        shell: bash
        env:
          PATTERN: ${{ inputs.prefix }}-v${{ needs.check-version.outputs.base-version }}-rc.*
          SHA: ${{ env.COMMIT_SHA }}
        run: |
          echo "::error::No rc tag matching '$PATTERN' found on $SHA — acceptance-stage produced no tag and none was pre-existing."
          exit 1

  # Parallel with acceptance-stage; qa-stage waits on both.
  acceptance-stage-legacy:
    needs: [check-version, local, commit-stage]
    if: ${{ always() && inputs.level != 'local' && inputs.level != 'commit' && !inputs.skip-acceptance-legacy && needs.check-version.result == 'success' && (inputs.skip-local-stage || needs.local.result == 'success') && (inputs.skip-commit-stage || needs.commit-stage.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage-legacy.yml
          poll-interval: ${{ inputs.debug-skip-tests && '60' || '180' }}
          timeout-seconds: '7200'
          workflow-inputs: '{"commit-sha": "${{ inputs.commit-sha }}", "debug-skip-tests": "${{ inputs.debug-skip-tests }}", "force-run": "true", "gh-optivem-ref": "${{ inputs.gh-optivem-ref }}"}'

  qa-stage:
    needs: [acceptance-stage, acceptance-stage-legacy]
    if: ${{ always() && inputs.level == 'qa' && needs.acceptance-stage.result == 'success' && contains(fromJSON('["success","skipped"]'), needs.acceptance-stage-legacy.result) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ inputs.prefix }}-qa-stage.yml
          poll-interval: '90'
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'

  qa-signoff:
    needs: [acceptance-stage, qa-stage]
    if: ${{ always() && inputs.level == 'qa' && needs.qa-stage.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ inputs.prefix }}-qa-signoff.yml
          poll-interval: '90'
          workflow-inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}", "result": "approved"}'

  # Note: prod-stage is intentionally NOT part of the pipeline.
  # Production releases are orchestrated externally via meta-release-stage (for full releases)
  # or via direct workflow_dispatch on the per-flavor *-prod-stage.yml workflows.
  # Keeping the release step out of the pipeline enforces the rule that
  # "verification" and "release" are separate concerns.

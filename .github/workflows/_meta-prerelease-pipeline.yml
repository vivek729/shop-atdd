name: _meta-prerelease-pipeline

on:
  workflow_call:
    inputs:
      level:
        description: 'Verification level: local, commit, acceptance, or qa'
        required: false
        type: string
        default: 'qa'
      variant:
        description: 'Variant to run (all = full matrix; any single variant = dry-run; dry-runs do NOT produce a meta-rc tag)'
        required: false
        type: string
        default: 'all'
      skip-local:
        description: 'Skip Phase 0 (local stages) for debugging — Phase 1 and Phase 2 still run if level permits'
        required: false
        type: boolean
        default: false
      skip-commit:
        description: 'Skip Phase 1 (commit stages) — Phase 2 reuses whatever images are already in GHCR. Useful for workflow/test-only iterations.'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in local stages and the acceptance-stage-legacy job in Phase 2'
        required: false
        type: boolean
        default: false
      debug-skip-tests:
        description: 'DEBUG ONLY: run the full meta pipeline (commit + pipeline + per-flavor prereleases) but bypass the slow acceptance-stage tests, the acceptance-stage-legacy run, the local-mode job, and cross-lang regression. Flavor rcs and meta-rc are still minted, so meta-release-stage can promote afterward. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false
      fail-fast:
        description: 'When true (default), the first failing matrix entry cancels its siblings. Set false to let every variant run to completion — useful when comparing failures across variants in one run.'
        required: false
        type: boolean
        default: true
      pipeline-timeout-seconds:
        description: 'Hard timeout (seconds) for each Phase 2 prerelease-pipeline-{variant} run before this workflow gives up waiting. Default 14400 (4h).'
        required: false
        type: string
        default: '14400'
      gh-optivem-ref:
        description: 'Build & install gh-optivem from this ref (branch/tag/SHA) instead of the latest release. Empty = latest release. Forwarded to every gh-optivem install site (check, local, acceptance, legacy, cross-lang, drift).'
        required: false
        type: string
        default: ''
    outputs:
      commit_sha:
        description: 'SHA the verification ran against. Equals the trigger SHA unless the check job auto-bumped via meta-bump-all, in which case it is the post-bump main HEAD. Callers that tag artifacts (e.g. meta-prerelease-stage tagging meta-rc) should use this rather than github.sha so the tag lands on the SHA that was actually verified.'
        value: ${{ jobs.check.outputs.commit_sha }}
      should_run:
        description: 'Whether the inner gate decided to run. False on scheduled runs when nothing under .github/workflows/, system/, or system-test/ changed since the last meta-rc. Callers that mint tags off this verification (e.g. meta-prerelease-stage tagging meta-rc) must gate on this so they do not mint a redundant tag against an already-verified SHA.'
        value: ${{ jobs.check.outputs.should_run }}

permissions: {}

# Concurrency is set on callers; declaring it here would collide and deadlock (github.workflow resolves to the caller).

jobs:
  # Single gate before any downstream jobs:
  #   1. Print inputs for visibility.
  #   2. On scheduled runs, skip the pipeline if nothing meaningful has changed since
  #      the last build — comparing HEAD against the latest meta-rc at this VERSION
  #      (falling back to the latest meta-v release). Only changes under
  #      .github/workflows/, system/, or system-test/ count as meaningful; VERSION
  #      bumps, docs, plans, and reports do not. workflow_dispatch always proceeds.
  #   3. Fail fast if any VERSION file's version has already been released.
  #      Each VERSION file has one release signal:
  #        - top-level VERSION (meta) probes the `meta-v<n>` git tag.
  #        - system/monolith/{lang}/VERSION probes the monolith-system-{lang} GHCR
  #          image tag AND the `monolith-{lang}-v<n>` per-flavor git tag.
  #        - system/multitier/{lang}/VERSION probes the `multitier-{lang}-v<n>`
  #          per-flavor git tag (the system-bundle release).
  #        - system/multitier/{component}/VERSION probes the multitier-{component}
  #          GHCR image tag.
  #      Probing all six per-flavor final-release tags up-front catches collisions
  #      that the per-pipeline `check-version` in `_prerelease-pipeline.yml` would
  #      otherwise only see in Phase 2 — after Phase 0 (local stages) and Phase 1
  #      (commit stages) have already burned ~30 min.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so the Verify step can dispatch + wait on meta-bump-all when
      # a version slot is already taken — auto-bumps the VERSION files so this
      # in-flight run can recover and proceed without a fresh trigger.
      actions: write
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      # SHA that downstream jobs should pin to. Equals the original github.sha
      # if no bump was needed; otherwise the post-bump main HEAD pushed by
      # meta-bump-all. Threaded out via the workflow_call's `commit_sha` output
      # so the calling stage workflow can tag meta-rc against the bumped SHA.
      commit_sha: ${{ steps.resolve-sha.outputs.commit_sha }}
    steps:
      - name: Print input parameters
        run: |
          echo "=== Workflow Inputs ==="
          echo "Level: ${{ inputs.level }}"
          echo "Variant: ${{ inputs.variant }}"
          echo "Skip local: ${{ inputs.skip-local }}"
          echo "Skip commit: ${{ inputs.skip-commit }}"
          echo "Skip acceptance-legacy: ${{ inputs.skip-acceptance-legacy }}"
          echo "Debug skip tests: ${{ inputs.debug-skip-tests }}"
          echo "Fail-fast: ${{ inputs.fail-fast }}"
          echo "Pipeline timeout (seconds): ${{ inputs.pipeline-timeout-seconds }}"
          echo "Triggered by: ${{ github.event_name }} ${{ github.event.schedule }}"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read VERSION
        id: version
        shell: bash
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Detect meaningful changes since last build
        id: changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: |
            meta-v${{ steps.version.outputs.value }}-rc.*
            meta-v[0-9]*.[0-9]*.[0-9]*
          paths: |
            .github/workflows/
            system/
            system-test/
      - name: Decide whether to run
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ steps.changes.outputs.changed }}
          BASELINE_TAG: ${{ steps.changes.outputs.baseline-tag }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed-files }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "Triggered by $EVENT_NAME — always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CHANGED" == "true" ]]; then
            echo "Meaningful changes detected — running pipeline."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${BASELINE_TAG}"
            {
              echo "## Skipped — no meaningful changes"
              echo ""
              echo "No changes in \`.github/workflows/\`, \`system/\`, or \`system-test/\` since [\`${BASELINE_TAG}\`](${TAG_URL})."
              echo ""
              echo "Runs again on next schedule tick, or trigger manually via workflow_dispatch to force a rebuild."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "No meaningful changes — skipping run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      # Schema + on-disk-layout check across every gh-optivem-*.yaml in the
      # repo root. Catches broken configs here, before Phase 0/1 burns ~30 min
      # only to fail on the same yaml at acceptance time. Cheap (~30s) and
      # pure-local — no docker, no network beyond the gh extension install.
      - name: Install gh-optivem CLI extension
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        uses: ./.github/actions/install-gh-optivem
        with:
          ref: ${{ inputs.gh-optivem-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate all gh-optivem configs
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: bash ./validate-all-gh-optivem-config.sh

      - name: Read VERSION values
        id: read-versions
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "meta=$(tr -d '[:space:]' < VERSION)"
            echo "ml_dotnet=$(tr -d '[:space:]' < system/monolith/dotnet/VERSION)"
            echo "ml_java=$(tr -d '[:space:]' < system/monolith/java/VERSION)"
            echo "ml_typescript=$(tr -d '[:space:]' < system/monolith/typescript/VERSION)"
            echo "mt_dotnet=$(tr -d '[:space:]' < system/multitier/dotnet/VERSION)"
            echo "mt_java=$(tr -d '[:space:]' < system/multitier/java/VERSION)"
            echo "mt_typescript=$(tr -d '[:space:]' < system/multitier/typescript/VERSION)"
            echo "mt_be_dotnet=$(tr -d '[:space:]' < system/multitier/backend-dotnet/VERSION)"
            echo "mt_be_java=$(tr -d '[:space:]' < system/multitier/backend-java/VERSION)"
            echo "mt_be_typescript=$(tr -d '[:space:]' < system/multitier/backend-typescript/VERSION)"
            echo "mt_fe_react=$(tr -d '[:space:]' < system/multitier/frontend-react/VERSION)"
          } >> "$GITHUB_OUTPUT"

      - name: Probe Meta System Release
        id: probe-release
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: meta-v${{ steps.read-versions.outputs.meta }}

      - name: Probe Component + Monolith Image Tags
        id: probe-images
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository }}/monolith-system-dotnet:v${{ steps.read-versions.outputs.ml_dotnet }}
            ghcr.io/${{ github.repository }}/monolith-system-java:v${{ steps.read-versions.outputs.ml_java }}
            ghcr.io/${{ github.repository }}/monolith-system-typescript:v${{ steps.read-versions.outputs.ml_typescript }}
            ghcr.io/${{ github.repository }}/multitier-backend-dotnet:v${{ steps.read-versions.outputs.mt_be_dotnet }}
            ghcr.io/${{ github.repository }}/multitier-backend-java:v${{ steps.read-versions.outputs.mt_be_java }}
            ghcr.io/${{ github.repository }}/multitier-backend-typescript:v${{ steps.read-versions.outputs.mt_be_typescript }}
            ghcr.io/${{ github.repository }}/multitier-frontend-react:v${{ steps.read-versions.outputs.mt_fe_react }}

      # Per-flavor final-release git tags `<prefix>-v<flavor-VERSION>` are minted
      # independently of meta-release by the per-flavor `*-prod-stage.yml`
      # workflows, so a slot can be taken without `meta-v<n>` existing yet. Probe
      # all six up-front so we fail before Phase 0/1 instead of in Phase 2.
      # Tags were fetched by the checkout above (fetch-depth: 0).
      - name: Probe Per-Flavor Final Release Tags
        id: probe-flavor-tags
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        env:
          ML_JAVA: ${{ steps.read-versions.outputs.ml_java }}
          ML_DOTNET: ${{ steps.read-versions.outputs.ml_dotnet }}
          ML_TYPESCRIPT: ${{ steps.read-versions.outputs.ml_typescript }}
          MT_JAVA: ${{ steps.read-versions.outputs.mt_java }}
          MT_DOTNET: ${{ steps.read-versions.outputs.mt_dotnet }}
          MT_TYPESCRIPT: ${{ steps.read-versions.outputs.mt_typescript }}
        run: |
          set -euo pipefail
          found=()
          for prefix in monolith-java monolith-dotnet monolith-typescript multitier-java multitier-dotnet multitier-typescript; do
            case "$prefix" in
              monolith-java)        ver="$ML_JAVA";        path="system/monolith/java/VERSION" ;;
              monolith-dotnet)      ver="$ML_DOTNET";      path="system/monolith/dotnet/VERSION" ;;
              monolith-typescript)  ver="$ML_TYPESCRIPT";  path="system/monolith/typescript/VERSION" ;;
              multitier-java)       ver="$MT_JAVA";        path="system/multitier/java/VERSION" ;;
              multitier-dotnet)     ver="$MT_DOTNET";      path="system/multitier/dotnet/VERSION" ;;
              multitier-typescript) ver="$MT_TYPESCRIPT";  path="system/multitier/typescript/VERSION" ;;
            esac
            tag="${prefix}-v${ver}"
            if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              found+=("${tag} (from ${path})")
            fi
          done
          if [ "${#found[@]}" -eq 0 ]; then
            echo "results=[]" >> "$GITHUB_OUTPUT"
          else
            results=$(printf '%s\n' "${found[@]}" | jq -R . | jq -sc '.')
            echo "results=${results}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Versions Not Yet Released (Pre-Bump)
        id: verify-pre-bump
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        env:
          META_EXISTS: ${{ steps.probe-release.outputs.exists }}
          META_KEY: meta-v${{ steps.read-versions.outputs.meta }} (from VERSION)
          IMAGE_RESULTS: ${{ steps.probe-images.outputs.results }}
          FLAVOR_TAG_RESULTS: ${{ steps.probe-flavor-tags.outputs.results }}
        run: |
          set -euo pipefail
          # Rebuild "<image-suffix>:<tag> (from <VERSION-path>)" display strings client-side.
          # monolith-system-* images are pinned by system/monolith/{lang}/VERSION;
          # multitier-* images each have their own VERSION under system/multitier/{component}/VERSION.
          found=$(jq -c '
            [
              .[] | select(.exists == true) |
              (.image | sub("^ghcr.io/[^/]+/[^/]+/"; "")) as $suffix |
              (if ($suffix | startswith("monolith-system-"))
               then "system/monolith/" + ($suffix | sub("^monolith-system-"; "")) + "/VERSION"
               else "system/multitier/" + ($suffix | sub("^multitier-"; "")) + "/VERSION"
               end) as $provenance |
              "\($suffix):\(.tag) (from \($provenance))"
            ]
          ' <<< "$IMAGE_RESULTS")
          if [[ "$META_EXISTS" == "true" ]]; then
            found=$(jq -c --arg k "$META_KEY" '. + [$k]' <<< "$found")
          fi
          # Merge per-flavor git-tag findings (already formatted as display strings).
          found=$(jq -c --argjson extra "$FLAVOR_TAG_RESULTS" '. + $extra' <<< "$found")
          if [[ "$(jq 'length' <<< "$found")" -gt 0 ]]; then
            BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/meta-bump-all.yml"
            {
              echo "## Version slot taken — auto-bumping"
              echo ""
              echo "The following artifacts already exist:"
              echo ""
              jq -r '.[] | "- `\(.)`"' <<< "$found"
              echo ""
              echo "Auto-dispatching the [meta-bump-all workflow](${BUMP_URL}) to advance every VERSION file (meta + 3 monolith flavors + 3 multitier flavors + multitier components — each child is idempotent), then re-checking before fanning out to local/commit/pipeline."
            } >> "$GITHUB_STEP_SUMMARY"
            found_flat=$(jq -r 'join(", ")' <<< "$found")
            echo "::notice::Version slot taken: ${found_flat}. Auto-dispatching meta-bump-all and re-checking."
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "All artifacts available for current VERSION values across meta + flavors + components + per-flavor tags. OK to proceed."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      # Auto-recovery: dispatch meta-bump-all (idempotent — children that have
      # nothing to bump exit clean) and wait for it to finish pushing the bump
      # commits, then re-probe everything against the new HEAD. Only fires when
      # the pre-bump verify found a collision.
      - name: Auto-Dispatch meta-bump-all And Wait
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: meta-bump-all.yml
          timeout-seconds: '900'
          poll-interval: '30'

      - name: Re-Checkout After Bump
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Re-Read VERSION Values
        id: read-versions-post-bump
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "meta=$(tr -d '[:space:]' < VERSION)"
            echo "ml_dotnet=$(tr -d '[:space:]' < system/monolith/dotnet/VERSION)"
            echo "ml_java=$(tr -d '[:space:]' < system/monolith/java/VERSION)"
            echo "ml_typescript=$(tr -d '[:space:]' < system/monolith/typescript/VERSION)"
            echo "mt_dotnet=$(tr -d '[:space:]' < system/multitier/dotnet/VERSION)"
            echo "mt_java=$(tr -d '[:space:]' < system/multitier/java/VERSION)"
            echo "mt_typescript=$(tr -d '[:space:]' < system/multitier/typescript/VERSION)"
            echo "mt_be_dotnet=$(tr -d '[:space:]' < system/multitier/backend-dotnet/VERSION)"
            echo "mt_be_java=$(tr -d '[:space:]' < system/multitier/backend-java/VERSION)"
            echo "mt_be_typescript=$(tr -d '[:space:]' < system/multitier/backend-typescript/VERSION)"
            echo "mt_fe_react=$(tr -d '[:space:]' < system/multitier/frontend-react/VERSION)"
          } >> "$GITHUB_OUTPUT"

      - name: Re-Probe Meta System Release
        id: probe-release-post-bump
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: meta-v${{ steps.read-versions-post-bump.outputs.meta }}

      - name: Re-Probe Component + Monolith Image Tags
        id: probe-images-post-bump
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository }}/monolith-system-dotnet:v${{ steps.read-versions-post-bump.outputs.ml_dotnet }}
            ghcr.io/${{ github.repository }}/monolith-system-java:v${{ steps.read-versions-post-bump.outputs.ml_java }}
            ghcr.io/${{ github.repository }}/monolith-system-typescript:v${{ steps.read-versions-post-bump.outputs.ml_typescript }}
            ghcr.io/${{ github.repository }}/multitier-backend-dotnet:v${{ steps.read-versions-post-bump.outputs.mt_be_dotnet }}
            ghcr.io/${{ github.repository }}/multitier-backend-java:v${{ steps.read-versions-post-bump.outputs.mt_be_java }}
            ghcr.io/${{ github.repository }}/multitier-backend-typescript:v${{ steps.read-versions-post-bump.outputs.mt_be_typescript }}
            ghcr.io/${{ github.repository }}/multitier-frontend-react:v${{ steps.read-versions-post-bump.outputs.mt_fe_react }}

      - name: Re-Probe Per-Flavor Final Release Tags
        id: probe-flavor-tags-post-bump
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        shell: bash
        env:
          ML_JAVA: ${{ steps.read-versions-post-bump.outputs.ml_java }}
          ML_DOTNET: ${{ steps.read-versions-post-bump.outputs.ml_dotnet }}
          ML_TYPESCRIPT: ${{ steps.read-versions-post-bump.outputs.ml_typescript }}
          MT_JAVA: ${{ steps.read-versions-post-bump.outputs.mt_java }}
          MT_DOTNET: ${{ steps.read-versions-post-bump.outputs.mt_dotnet }}
          MT_TYPESCRIPT: ${{ steps.read-versions-post-bump.outputs.mt_typescript }}
        run: |
          set -euo pipefail
          found=()
          for prefix in monolith-java monolith-dotnet monolith-typescript multitier-java multitier-dotnet multitier-typescript; do
            case "$prefix" in
              monolith-java)        ver="$ML_JAVA";        path="system/monolith/java/VERSION" ;;
              monolith-dotnet)      ver="$ML_DOTNET";      path="system/monolith/dotnet/VERSION" ;;
              monolith-typescript)  ver="$ML_TYPESCRIPT";  path="system/monolith/typescript/VERSION" ;;
              multitier-java)       ver="$MT_JAVA";        path="system/multitier/java/VERSION" ;;
              multitier-dotnet)     ver="$MT_DOTNET";      path="system/multitier/dotnet/VERSION" ;;
              multitier-typescript) ver="$MT_TYPESCRIPT";  path="system/multitier/typescript/VERSION" ;;
            esac
            tag="${prefix}-v${ver}"
            if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              found+=("${tag} (from ${path})")
            fi
          done
          if [ "${#found[@]}" -eq 0 ]; then
            echo "results=[]" >> "$GITHUB_OUTPUT"
          else
            results=$(printf '%s\n' "${found[@]}" | jq -R . | jq -sc '.')
            echo "results=${results}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Versions Not Yet Released (Post-Bump)
        if: ${{ steps.verify-pre-bump.outputs.needs_bump == 'true' }}
        shell: bash
        env:
          META_EXISTS: ${{ steps.probe-release-post-bump.outputs.exists }}
          META_KEY: meta-v${{ steps.read-versions-post-bump.outputs.meta }} (from VERSION)
          IMAGE_RESULTS: ${{ steps.probe-images-post-bump.outputs.results }}
          FLAVOR_TAG_RESULTS: ${{ steps.probe-flavor-tags-post-bump.outputs.results }}
        run: |
          set -euo pipefail
          found=$(jq -c '
            [
              .[] | select(.exists == true) |
              (.image | sub("^ghcr.io/[^/]+/[^/]+/"; "")) as $suffix |
              (if ($suffix | startswith("monolith-system-"))
               then "system/monolith/" + ($suffix | sub("^monolith-system-"; "")) + "/VERSION"
               else "system/multitier/" + ($suffix | sub("^multitier-"; "")) + "/VERSION"
               end) as $provenance |
              "\($suffix):\(.tag) (from \($provenance))"
            ]
          ' <<< "$IMAGE_RESULTS")
          if [[ "$META_EXISTS" == "true" ]]; then
            found=$(jq -c --arg k "$META_KEY" '. + [$k]' <<< "$found")
          fi
          found=$(jq -c --argjson extra "$FLAVOR_TAG_RESULTS" '. + $extra' <<< "$found")
          if [[ "$(jq 'length' <<< "$found")" -gt 0 ]]; then
            BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/meta-bump-all.yml"
            {
              echo "## Version slots STILL taken after auto-bump"
              echo ""
              echo "The following artifacts existed both before and after meta-bump-all ran:"
              echo ""
              jq -r '.[] | "- `\(.)`"' <<< "$found"
              echo ""
              echo "meta-bump-all did not advance the relevant VERSION files. Investigate manually: ${BUMP_URL}"
            } >> "$GITHUB_STEP_SUMMARY"
            found_flat=$(jq -r 'join(", ")' <<< "$found")
            echo "::error::Version slot STILL taken after auto-bump: ${found_flat}. Investigate meta-bump-all: ${BUMP_URL}"
            exit 1
          fi
          echo "All artifacts available after auto-bump. OK to proceed."

      # Resolve the SHA downstream jobs should pin to. If we bumped, this is the
      # post-bump main HEAD (which contains the new VERSION files); otherwise it's
      # the original github.sha so behavior is unchanged on the no-bump path.
      - name: Resolve Downstream commit_sha
        id: resolve-sha
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        env:
          NEEDS_BUMP: ${{ steps.verify-pre-bump.outputs.needs_bump }}
          ORIGINAL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$NEEDS_BUMP" == "true" ]]; then
            sha=$(git rev-parse HEAD)
            echo "Post-bump HEAD: $sha"
          else
            sha="$ORIGINAL_SHA"
            echo "No bump needed; reusing original SHA: $sha"
          fi
          echo "commit_sha=$sha" >> "$GITHUB_OUTPUT"

  # Phase 0/1a: Run all local stages in parallel — independent of `commit` (Phase 1b)
  # and runs alongside it. fail-fast (input, default true) cancels siblings on first failure.
  local:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' && !inputs.skip-local && !inputs.debug-skip-tests }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        variant: [monolith-java, monolith-dotnet, monolith-typescript, multitier-java, multitier-dotnet, multitier-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - if: ${{ inputs.variant == 'all' || inputs.variant == matrix.variant }}
        uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: prerelease-pipeline-${{ matrix.variant }}.yml
          workflow-inputs: '{"level": "local", "skip-commit-stage": "true", "skip-acceptance-legacy": "${{ inputs.skip-acceptance-legacy }}", "commit-sha": "${{ needs.check.outputs.commit_sha }}", "gh-optivem-ref": "${{ inputs.gh-optivem-ref }}"}'

  # Phase 1b: Run all commit stages in parallel (deduplicated — frontend-react is shared
  # across multitier variants). Independent of `local` (Phase 1a) — both gate only on `check`
  # and run concurrently; Phase 2 jobs (`pipeline`, `cross-lang`) wait on both.
  # fail-fast (input, default true) cancels siblings on first failure.
  commit:
    needs: check
    if: ${{ always() && !failure() && !cancelled() && needs.check.outputs.should_run == 'true' && !inputs.skip-commit && contains(fromJSON('["commit","acceptance","qa"]'), inputs.level) }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        include:
          - stage: monolith-java
            workflow: monolith-java-commit-stage.yml
            variants: '["all","monolith-java"]'
          - stage: monolith-dotnet
            workflow: monolith-dotnet-commit-stage.yml
            variants: '["all","monolith-dotnet"]'
          - stage: monolith-typescript
            workflow: monolith-typescript-commit-stage.yml
            variants: '["all","monolith-typescript"]'
          - stage: multitier-backend-java
            workflow: multitier-backend-java-commit-stage.yml
            variants: '["all","multitier-java"]'
          - stage: multitier-backend-dotnet
            workflow: multitier-backend-dotnet-commit-stage.yml
            variants: '["all","multitier-dotnet"]'
          - stage: multitier-backend-typescript
            workflow: multitier-backend-typescript-commit-stage.yml
            variants: '["all","multitier-typescript"]'
          - stage: multitier-frontend-react
            workflow: multitier-frontend-react-commit-stage.yml
            variants: '["all","multitier-java","multitier-dotnet","multitier-typescript"]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - if: ${{ contains(fromJSON(matrix.variants), inputs.variant) }}
        uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: ${{ matrix.workflow }}
          poll-interval: '60'
          workflow-inputs: '{"commit-sha": "${{ needs.check.outputs.commit_sha }}"}'

  # Phase 2: Run all pipelines in parallel. Each pipeline produces RC tags namespaced
  # by its prefix (e.g. monolith-java-v1.0.0-rc.N), so there are no shared-counter collisions.
  # Only needs `commit` (the GHCR images this phase consumes); `local` runs in parallel
  # but does not gate this phase — a local failure still blocks `tag-meta-rc` upstream
  # via the workflow_call's aggregate result.
  # fail-fast (input, default true) cancels siblings on first failure.
  pipeline:
    needs: [check, commit]
    if: ${{ always() && !failure() && !cancelled() && needs.check.outputs.should_run == 'true' && contains(fromJSON('["acceptance","qa"]'), inputs.level) }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        variant: [monolith-java, monolith-dotnet, monolith-typescript, multitier-java, multitier-dotnet, multitier-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - if: ${{ inputs.variant == 'all' || inputs.variant == matrix.variant }}
        uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: prerelease-pipeline-${{ matrix.variant }}.yml
          timeout-seconds: ${{ inputs.pipeline-timeout-seconds }}
          workflow-inputs: '{"level": "${{ inputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true", "skip-acceptance-legacy": "${{ inputs.skip-acceptance-legacy }}", "commit-sha": "${{ needs.check.outputs.commit_sha }}", "debug-skip-tests": "${{ inputs.debug-skip-tests }}", "gh-optivem-ref": "${{ inputs.gh-optivem-ref }}"}'

  # Cross-language behavior-parity regression check. Runs in parallel with `pipeline`
  # above — both need `commit` because cross-lang pulls the `sha-<sha>` images that
  # the commit stages publish (resolve-docker-image-digests would 404 otherwise).
  # Pinned to the same SHA so workflow files / systems.yaml / tests config match the
  # commit being verified.
  #
  # Gated on variant == 'all' because cross-lang exercises all 6 (arch, lang) SUTs
  # against each other; a single-variant run only publishes one SUT image set, so the
  # other matrix entries would 404 on digest resolution.
  cross-lang:
    needs: [check, commit]
    if: ${{ always() && !failure() && !cancelled() && needs.check.outputs.should_run == 'true' && !inputs.debug-skip-tests && inputs.variant == 'all' && contains(fromJSON('["acceptance","qa"]'), inputs.level) }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/cross-lang-system-verification.yml
    secrets: inherit
    with:
      commit-sha: ${{ needs.check.outputs.commit_sha }}
      gh-optivem-ref: ${{ inputs.gh-optivem-ref }}

  # Cross-language schema drift check. Parallel sibling of `cross-lang` — same
  # gate (needs `commit` for the `sha-<sha>` images; variant=='all' because
  # drift exercises both Java and TS SUTs; same level gating).
  #
  # Brings up Java's `real`+`stub` compose stacks, runs the Java smoke-stub
  # suite, tears the apps down with `down` (volumes survive), brings up
  # TypeScript's `real`+`stub` stacks (which reuse the postgres-data volumes
  # via the shared `my-shop-{real,stub}` compose project names), runs the TS
  # smoke-stub suite. Both green ⇒ the canonical Flyway migration set
  # produces a schema both stacks can read. .NET third leg deferred.
  #
  # Failure here trips tag-meta-rc's `!failure()` aggregate in
  # meta-prerelease-stage.yml just like a cross-lang failure does, so a drift
  # red blocks the meta-rc tag.
  drift:
    needs: [check, commit]
    if: ${{ always() && !failure() && !cancelled() && needs.check.outputs.should_run == 'true' && !inputs.debug-skip-tests && inputs.variant == 'all' && contains(fromJSON('["acceptance","qa"]'), inputs.level) }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/drift.yml
    secrets: inherit
    with:
      commit-sha: ${{ needs.check.outputs.commit_sha }}
      gh-optivem-ref: ${{ inputs.gh-optivem-ref }}

project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo-strategy: mono-repo
channels: [api, ui]
sonar:
    organization: optivem
system:
    architecture: multitier
    config: docker/java/multitier/systems.yaml
    backend:
        path: system/multitier/backend-java
        repo: optivem/shop
        lang: java
        sonar-project: optivem_shop-multitier-backend-java
    frontend:
        path: system/multitier/frontend-react
        repo: optivem/shop
        lang: typescript
        sonar-project: optivem_shop-multitier-frontend-react
    db-migration-path: system/db/migrations
system-test:
    path: system-test/java
    config: system-test/java/tests.legacy.yaml
    repo: optivem/shop
    lang: java
    sonar-project: optivem_shop-tests-java
    paths:
        system-driver-port: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/port
        system-driver-adapter: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/adapter
        external-system-driver-port: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/port/external
        external-system-driver-adapter: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/adapter/external
        at-test: system-test/java/src/test/java/com/mycompany/myshop/systemtest/latest/acceptance
        dsl-port: system-test/java/src/main/java/com/mycompany/myshop/testkit/dsl/port
        dsl-core: system-test/java/src/main/java/com/mycompany/myshop/testkit/dsl/core
        ct-test: system-test/java/src/test/java/com/mycompany/myshop/systemtest/latest/contract
    system-driver-adapter-channels:
        api: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/adapter/api
        ui: system-test/java/src/main/java/com/mycompany/myshop/testkit/driver/adapter/ui
external-systems:
    stubs:
        path: external-systems/stubs
        repo: optivem/shop
    simulators:
        path: external-systems/simulators
        repo: optivem/shop

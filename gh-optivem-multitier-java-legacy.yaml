project:
    url: https://github.com/orgs/optivem/projects/20
repo_strategy: mono-repo
system:
    architecture: multitier
    config: docker/java/multitier/systems.yaml
    backend:
        path: system/multitier/backend-java
        repo: optivem/shop
        lang: java
    frontend:
        path: system/multitier/frontend-react
        repo: optivem/shop
        lang: typescript
system_test:
    path: system-test/java
    config: system-test/java/tests.legacy.yaml
    repo: optivem/shop
    lang: java
external_systems:
    stubs:
        path: external-systems/external-stub
        repo: optivem/shop
    simulators:
        path: external-real-sim
        repo: optivem/shop

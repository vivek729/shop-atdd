project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo-strategy: mono-repo
sonar:
    organization: optivem
system:
    architecture: multitier
    config: docker/typescript/multitier/systems.yaml
    backend:
        path: system/multitier/backend-typescript
        repo: optivem/shop
        lang: typescript
        sonar-project: optivem_shop-multitier-backend-typescript
    frontend:
        path: system/multitier/frontend-react
        repo: optivem/shop
        lang: typescript
        sonar-project: optivem_shop-multitier-frontend-react
    db-migration-path: system/db/migrations
system-test:
    path: system-test/typescript
    config: system-test/typescript/tests.yaml
    repo: optivem/shop
    lang: typescript
    sonar-project: optivem_shop-tests-typescript
    paths:
        driver-port: system-test/typescript/src/testkit/driver/port
        driver-adapter: system-test/typescript/src/testkit/driver/adapter
        external-system-driver-port: system-test/typescript/src/testkit/driver/port/external
        external-system-driver-adapter: system-test/typescript/src/testkit/driver/adapter/external
        at-test: system-test/typescript/tests/latest/acceptance
        dsl-port: system-test/typescript/src/testkit/dsl/port
        dsl-core: system-test/typescript/src/testkit/dsl/core
        ct-test: system-test/typescript/tests/latest/contract
external-systems:
    stubs:
        path: external-systems/stubs
        repo: optivem/shop
    simulators:
        path: external-systems/simulators
        repo: optivem/shop

name: my-shop-real

services:

  system:
    image: ${SYSTEM_IMAGE_SYSTEM:-ghcr.io/optivem/shop/monolith-system-java:latest}
    ports:
      - "3111:8080"
      - "8111:8080"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME:-app}
      - POSTGRES_DB_USER=${POSTGRES_DB_USER:-app}
      - POSTGRES_DB_PASSWORD=${POSTGRES_DB_PASSWORD:-app}
      - ERP_API_URL=http://external-real:9000/erp
      - CLOCK_API_URL=http://external-real:9000/clock
      - TAX_API_URL=http://external-real:9000/tax
      - EXTERNAL_SYSTEM_MODE=real
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME:-app}
      - POSTGRES_USER=${POSTGRES_DB_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_DB_PASSWORD:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER:-app} -d ${POSTGRES_DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    build:
      context: ../../../external-systems/external-real-sim
      dockerfile: Dockerfile
    ports:
      - "9111:9000"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge

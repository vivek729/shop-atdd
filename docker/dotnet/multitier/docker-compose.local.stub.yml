name: my-shop-stub

services:

  frontend:
    build:
      context: ../../../system/multitier/frontend-react
      dockerfile: Dockerfile
    ports:
      - "3212:3000"
    environment:
      - BACKEND_API_URL=http://backend:8081
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  backend:
    build:
      context: ../../../system/multitier/backend-dotnet
      dockerfile: Dockerfile
    ports:
      - "8212:8081"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=app
      - POSTGRES_DB_USER=app
      - POSTGRES_DB_PASSWORD=app
      - ALLOWED_ORIGINS=http://localhost:3212,http://frontend:3000
      - ERP_API_URL=http://external-system-stubs:8080/erp
      - CLOCK_API_URL=http://external-system-stubs:8080/clock
      - TAX_API_URL=http://external-system-stubs:8080/tax
      - EXTERNAL_SYSTEM_MODE=stub
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      external-system-stubs:
        condition: service_started
    networks:
      - app-network

  db-migrate:
    image: flyway/flyway:10.21.0-alpine
    command: -url=jdbc:postgresql://postgres:5432/app -user=app -password=app -locations=filesystem:/migrations migrate
    environment:
      FLYWAY_CLEAN_DISABLED: "true"
    volumes:
      - ../../../system/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-system-stubs:
    image: wiremock/wiremock:3.10.0
    ports:
      - "9212:8080"
    volumes:
      - ../../../external-systems/stubs:/home/wiremock
    command: --verbose --global-response-templating
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge

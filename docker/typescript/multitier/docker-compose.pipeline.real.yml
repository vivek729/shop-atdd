name: my-shop-real

services:

  frontend:
    image: ${SYSTEM_IMAGE_FRONTEND:-ghcr.io/optivem/shop/multitier-frontend-react:latest}
    ports:
      - "3311:3000"
    environment:
      - BACKEND_API_URL=http://backend:8081
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  backend:
    image: ${SYSTEM_IMAGE_BACKEND:-ghcr.io/optivem/shop/multitier-backend-typescript:latest}
    ports:
      - "8311:8081"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME:-app}
      - POSTGRES_DB_USER=${POSTGRES_DB_USER:-app}
      - POSTGRES_DB_PASSWORD=${POSTGRES_DB_PASSWORD:-app}
      - ALLOWED_ORIGINS=http://localhost:3311,http://frontend:3000
      - ERP_API_URL=http://external-system-simulators:9000/erp
      - CLOCK_API_URL=http://external-system-simulators:9000/clock
      - TAX_API_URL=http://external-system-simulators:9000/tax
      - EXTERNAL_SYSTEM_MODE=real
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      external-system-simulators:
        condition: service_healthy
    networks:
      - app-network

  db-migrate:
    image: flyway/flyway:10.21.0-alpine
    command: -url=jdbc:postgresql://postgres:5432/app -user=app -password=app -locations=filesystem:/migrations migrate
    environment:
      FLYWAY_CLEAN_DISABLED: "true"
    volumes:
      - ../../../system/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME:-app}
      - POSTGRES_USER=${POSTGRES_DB_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_DB_PASSWORD:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER:-app} -d ${POSTGRES_DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-system-simulators:
    build:
      context: ../../../external-systems/simulators
      dockerfile: Dockerfile
    ports:
      - "9311:9000"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge

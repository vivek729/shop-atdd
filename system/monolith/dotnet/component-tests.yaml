setupCommands:
  - name: Restore Dependencies
    command: dotnet restore
compileCommands:
  - name: Compile production + test projects
    command: dotnet build
testFilter: --filter DisplayName~<test>
suites:
  - id: unit
    name: Unit
    pending: true
  - id: integration
    name: Narrow Integration
    command: dotnet test Tests --filter Category=Integration
    sampleTest: "SavesAndReadsBackOrder"
    requiresDocker: true
  - id: component
    name: Component
    command: dotnet test Tests
    sampleTest: "HealthEndpoint_ReturnsUp"
  - id: provider-verification
    name: Provider Verification (Pact)
    pending: true
    # Deferred — no in-process consumer; frontend-react only consumes the multitier backends.
    # Wire once a consumer emits a .pact file targeting this monolith.
suiteGroups:
  all: [unit, integration, component, provider-verification]

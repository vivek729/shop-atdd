<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>New Order</title>
</head>
<body>
<section>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">New Order</li>
        </ol>
    </nav>

    <h2>New Order</h2>

    <div id="notifications"></div>

    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Place Your Order</h4>
                </div>
                <div class="card-body">
                    <form id="placeOrderForm">
                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU:</label>
                            <input type="text" class="form-control" id="sku"
                                   placeholder="Enter product SKU" aria-label="SKU">
                        </div>
                        <div class="mb-3">
                            <label for="quantity" class="form-label">Quantity:</label>
                            <input type="text" class="form-control" id="quantity"
                                   inputmode="numeric" placeholder="Enter quantity"
                                   aria-label="Quantity">
                        </div>
                        <div class="mb-3">
                            <label for="country" class="form-label">Country:</label>
                            <input type="text" class="form-control" id="country"
                                   placeholder="Enter country code" aria-label="Country">
                        </div>
                        <div class="mb-3">
                            <label for="couponCode" class="form-label">Coupon Code (optional):</label>
                            <input type="text" class="form-control" id="couponCode"
                                   placeholder="Enter coupon code" aria-label="Coupon Code">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" aria-label="Place Order">
                                Place Order
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (!window._notificationCounter) window._notificationCounter = 0;

        document.getElementById('placeOrderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            var submitBtn = document.getElementById('submitBtn');
            var notifications = document.getElementById('notifications');
            var sku = document.getElementById('sku').value;
            var quantityValue = document.getElementById('quantity').value;
            var country = document.getElementById('country').value;
            var couponCode = document.getElementById('couponCode').value;

            window._notificationCounter++;
            var nid = window._notificationCounter;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Placing Order...';
            notifications.innerHTML = '';

            try {
                var body = {};
                if (sku !== '') body.sku = sku;
                if (quantityValue !== '') {
                    var trimmed = quantityValue.trim();
                    if (trimmed === '') {
                        body.quantity = quantityValue;
                    } else {
                        var num = Number(trimmed);
                        body.quantity = isNaN(num) ? quantityValue : num;
                    }
                }
                if (country !== '') body.country = country;
                if (couponCode !== '') body.couponCode = couponCode;

                var response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                var data = await response.json();

                if (response.ok) {
                    notifications.innerHTML = '<div class="notification success" role="alert" data-notification-id="' + nid + '">Success! Order has been created with Order Number ' + data.orderNumber + '</div>';
                } else {
                    var errorHtml = '<div class="notification error" role="alert" data-notification-id="' + nid + '">';
                    errorHtml += '<div class="error-message">' + (data.detail || 'An error occurred') + '</div>';
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(function(err) {
                            var fieldPart = err.field ? err.field + ': ' : '';
                            errorHtml += '<div class="field-error">' + fieldPart + err.message + '</div>';
                        });
                    }
                    errorHtml += '</div>';
                    notifications.innerHTML = errorHtml;
                }
            } catch (err) {
                notifications.innerHTML = '<div class="notification error" role="alert" data-notification-id="' + nid + '"><div class="error-message">Network error: ' + err.message + '</div></div>';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Place Order';
            }
        });
    </script>
</section>
</body>
</html>

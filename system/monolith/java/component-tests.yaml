setupCommands:
  - name: Pre-warm Gradle
    command: .\gradlew.bat --version
testFilter: --tests '*.<test>'
suites:
  - id: unit
    name: Unit
    pending: true
  - id: integration
    name: Narrow Integration
    command: .\gradlew.bat integrationTest --tests '*IntegrationTest'
    sampleTest: "savesAndReadsBackOrder"
    requiresDocker: true
  - id: component
    name: Component
    command: .\gradlew.bat test
    sampleTest: "contextLoads"
    requiresDocker: true
  - id: provider-verification
    name: Provider Verification (Pact)
    pending: true
    # Deferred — no in-process consumer; frontend-react only consumes the multitier backends.
    # Wire once a consumer emits a .pact file targeting this monolith.
suiteGroups:
  all: [unit, integration, component, provider-verification]

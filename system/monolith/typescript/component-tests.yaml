setupCommands:
  - name: Install Dependencies
    command: npm ci
testFilter: -t '<test>'
suites:
  - id: unit
    name: Unit
    command: npm test
    sampleTest: "should be defined"
  - id: integration
    name: Narrow Integration
    pending: true
    # testcontainers-node setup required — see plans/20260624-0950-typescript-narrow-integration-testcontainers.md
  - id: component
    name: Component
    pending: true
  - id: contract
    name: Consumer Contract (Pact)
    pending: true
    # Deferred — no in-process consumer; frontend-react only consumes the multitier backends.
    # Wire once a consumer emits a .pact file targeting this monolith.
suiteGroups:
  all: [unit, integration, component, contract]

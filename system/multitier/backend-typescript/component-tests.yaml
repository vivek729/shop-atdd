setupCommands:
  - name: Install Dependencies
    command: npm ci
compileCommands:
  - name: Typecheck production + test sources
    command: npx tsc --noEmit
testFilter: -t '<test>'
suites:
  - id: unit
    name: Unit
    command: npm test
    sampleTest: 'should return "Hello World!"'
  - id: integration
    name: Narrow Integration
    command: npm run test:integration
    sampleTest: "saves an order and reads it back"
    requiresDocker: true
  - id: component
    name: Component
    command: npm run test:component
    sampleTest: "computes totals from price, promotion and tax"
    requiresDocker: true
  - id: provider-verification
    name: Provider Verification (Pact)
    command: npm run test:pact
    sampleTest: "verifies the frontend consumer contract"
    requiresDocker: true
suiteGroups:
  all: [unit, integration, component, provider-verification]

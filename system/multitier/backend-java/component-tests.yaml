setupCommands:
  - name: Pre-warm Gradle
    command: .\gradlew.bat --version
compileCommands:
  - name: Compile production + test source sets
    command: .\gradlew.bat compileJava compileTestJava compileIntegrationTestJava compileComponentTestJava
testFilter: --tests '*.<test>'
suites:
  - id: unit
    name: Unit
    command: .\gradlew.bat test
    sampleTest: "onePlusOne"
  - id: integration
    name: Narrow Integration
    command: .\gradlew.bat integrationTest --tests '*IntegrationTest'
    sampleTest: "savesAndReadsBackOrder"
    requiresDocker: true
  - id: component
    name: Component
    command: .\gradlew.bat componentTest --tests 'com.mycompany.myshop.backend.component.*'
    sampleTest: "bootsInProcessAndServesHttp"
    requiresDocker: true
  - id: provider-verification
    name: Provider Verification (Pact)
    command: .\gradlew.bat componentTest --tests 'com.mycompany.myshop.backend.contract.*'
    sampleTest: "verify"
    requiresDocker: true
suiteGroups:
  all: [unit, integration, component, provider-verification]

setupCommands:
  - name: Pre-warm Gradle
    command: ./gradlew --version
testFilter: --tests '*.<test>'
suites:
  - id: unit
    name: Unit
    command: ./gradlew test
    sampleTest: "contextLoads"
    requiresDocker: true
  - id: integration
    name: Narrow Integration
    pending: true
  - id: component
    name: Component
    command: ./gradlew componentTest --tests '*Component*'
    sampleTest: "bootsInProcessAndServesHttp"
    requiresDocker: true
  - id: contract
    name: Consumer Contract (Pact)
    command: ./gradlew componentTest --tests '*Pact*'
    sampleTest: "verify"
    requiresDocker: true
suiteGroups:
  all: [unit, integration, component, contract]

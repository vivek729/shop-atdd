setupCommands:
  - name: Restore Dependencies
    command: dotnet restore
testFilter: --filter DisplayName~<test>
suites:
  - id: unit
    name: Unit
    pending: true
  - id: integration
    name: Narrow Integration
    command: dotnet test Tests --filter Category=Integration
    sampleTest: "SavesAndReadsBackOrder"
    requiresDocker: true
  - id: component
    name: Component
    command: dotnet test Tests
    sampleTest: "HealthEndpoint_ReturnsUp"
  - id: contract
    name: Consumer Contract (Pact)
    command: dotnet test Tests --filter "Category=Contract"
    sampleTest: "Verify"
    requiresDocker: false
suiteGroups:
  all: [unit, integration, component, contract]

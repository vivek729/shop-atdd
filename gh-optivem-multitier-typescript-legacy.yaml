project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo_strategy: mono-repo
sonar:
    organization: optivem
system:
    architecture: multitier
    config: docker/typescript/multitier/systems.yaml
    backend:
        path: system/multitier/backend-typescript
        repo: optivem/shop
        lang: typescript
        sonar_project: optivem_shop-multitier-backend-typescript
    frontend:
        path: system/multitier/frontend-react
        repo: optivem/shop
        lang: typescript
        sonar_project: optivem_shop-multitier-frontend-react
system_test:
    path: system-test/typescript
    config: system-test/typescript/tests.legacy.yaml
    repo: optivem/shop
    lang: typescript
    sonar_project: optivem_shop-tests-typescript
external_systems:
    stubs:
        path: external-systems/stubs
        repo: optivem/shop
    simulators:
        path: external-systems/simulators
        repo: optivem/shop
